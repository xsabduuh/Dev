<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Code Editor – Preview Fix</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
:root{
  --bg:#000;--bg-s:#0a0a0a;--bg-card:#111;--bg-hover:#1a1a1a;--bg-menu:#141414;
  --border:#222;--bhi:#2e2e2e;
  --fg:#e4e4e4;--fg2:#777;--fg3:#3a3a3a;
  --acc:#c792ea;--green:#c3e88d;--blue:#82aaff;--org:#f78c6c;--yel:#ffcb6b;--red:#ff5370;
  --hh:50px;--th:36px;--tbh:70px;
  --mono:'Cascadia Code','Fira Code','JetBrains Mono','Courier New',monospace;
}
html{height:100%;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
body{height:100%;width:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--fg);-webkit-font-smoothing:antialiased;}
button{cursor:pointer;font-family:inherit;-webkit-user-select:none;user-select:none;}

/* Shell */
.shell{display:flex;flex-direction:column;height:100dvh;width:100vw;overflow:hidden;position:fixed;inset:0;background:var(--bg);}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;height:var(--hh);background:var(--bg-s);border-bottom:1px solid var(--border);padding:0 16px;flex-shrink:0;position:relative;z-index:10;}
.h-side{width:44px;display:flex;align-items:center;}
.h-side.r{justify-content:flex-end;}
.h-title{font-size:14px;font-weight:600;letter-spacing:.07em;color:var(--fg);position:absolute;left:50%;transform:translateX(-50%);}
.play-btn{width:38px;height:38px;border-radius:50%;background:var(--acc);border:none;display:flex;align-items:center;justify-content:center;transition:background .15s,transform .1s;flex-shrink:0;}
.play-btn:hover{background:#d9a8ff;}.play-btn:active{transform:scale(.92);}
.play-btn svg{margin-left:2px;display:block;}

/* Tabs */
.tabs-bar{display:flex;align-items:stretch;height:var(--th);background:var(--bg-s);border-bottom:1px solid var(--border);overflow-x:auto;overflow-y:hidden;flex-shrink:0;scrollbar-width:none;touch-action:pan-x;}
.tabs-bar::-webkit-scrollbar{display:none;}
.tab{display:inline-flex;align-items:center;gap:7px;padding:0 14px;height:100%;background:transparent;border:none;border-right:1px solid var(--border);color:var(--fg2);font-family:var(--mono);font-size:12px;white-space:nowrap;flex-shrink:0;cursor:pointer;transition:color .12s,background .12s;position:relative;}
.tab:hover{color:var(--fg);background:var(--bg-hover);}
.tab.active{color:var(--fg);background:var(--bg);}
.tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--acc);}
.tab-x{display:flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:4px;background:transparent;border:none;color:var(--fg3);padding:0;cursor:pointer;transition:color .12s,background .12s;flex-shrink:0;}
.tab-x:hover{color:var(--red);background:rgba(255,83,112,.14);}

/* Editor */
.editor-wrap{flex:1;display:flex;overflow:hidden;min-height:0;background:var(--bg);}
.line-nums{width:50px;flex-shrink:0;background:var(--bg-s);border-right:1px solid var(--border);padding:14px 0;overflow:hidden;user-select:none;-webkit-user-select:none;text-align:right;}
.ln{font-family:var(--mono);font-size:14px;line-height:1.57;color:var(--fg3);padding-right:10px;}
.editor-inner{flex:1;position:relative;overflow:hidden;}
.hl-layer,.code-area{
  position:absolute;inset:0;
  padding:14px;
  font-family:var(--mono);
  font-size:14px;
  line-height:1.57;
  white-space:pre;
  overflow:auto;
  tab-size:2;-moz-tab-size:2;
  word-spacing:normal;letter-spacing:normal;
}
.hl-layer{color:var(--fg);pointer-events:none;z-index:1;overflow:hidden;}
.code-area{
  z-index:2;background:transparent;color:transparent;
  caret-color:var(--acc);border:none;outline:none;resize:none;
  width:100%;height:100%;
  -webkit-text-fill-color:transparent;
  -webkit-user-select:text;user-select:text;
  touch-action:pan-x pan-y;
}
.code-area::selection{background:rgba(199,146,234,.22);}

/* Syntax */
.kw{color:var(--acc);font-style:italic;}
.str{color:var(--green);}
.cmt{color:#3d3d3d;font-style:italic;}
.num{color:var(--org);}
.fn{color:var(--blue);}
.cls{color:var(--yel);}

/* Toolbar */
.toolbar{height:var(--tbh);background:var(--bg-s);border-top:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;z-index:10;padding-bottom:10px;}
.tb-inner{display:flex;align-items:center;justify-content:center;width:100%;max-width:520px;padding:0 16px;}
.ic-btn{width:38px;height:38px;border-radius:50%;background:var(--bg-card);border:1px solid var(--bhi);color:var(--fg2);display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s,transform .1s,border-color .12s;flex-shrink:0;}
.ic-btn:hover:not(:disabled){background:var(--bg-hover);color:var(--fg);border-color:#444;}
.ic-btn:active:not(:disabled){transform:scale(.9);}
.ic-btn:disabled{opacity:.25;cursor:not-allowed;}

/* Copy tooltip */
.sel-wrap{position:relative;}
.copy-tip{position:absolute;bottom:calc(100% + 12px);left:50%;transform:translateX(-50%);background:var(--bg-menu);border:1px solid var(--bhi);border-radius:8px;padding:6px 10px;display:none;align-items:center;gap:6px;white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,.8);z-index:600;}
.copy-tip.show{display:flex;}
.copy-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--bhi);}
.copy-btn2{display:flex;align-items:center;gap:5px;background:none;border:none;color:var(--fg);font-size:12px;font-weight:500;padding:0;cursor:pointer;transition:color .12s;}
.copy-btn2:hover{color:var(--acc);}
.tip-dismiss{display:flex;align-items:center;background:none;border:none;color:var(--fg2);padding:0;cursor:pointer;}
.tip-dismiss:hover{color:var(--fg);}

/* Dropdown */
.menu-wrap{position:relative;}
.dropdown{position:absolute;bottom:calc(100% + 12px);right:0;background:var(--bg-menu);border:1px solid var(--bhi);border-radius:10px;overflow:hidden;min-width:188px;box-shadow:0 12px 36px rgba(0,0,0,.9);z-index:600;display:none;}
.dropdown.show{display:block;}
.dd-item{display:flex;align-items:center;gap:9px;width:100%;padding:10px 14px;background:none;border:none;color:var(--fg2);font-size:13px;text-align:left;cursor:pointer;transition:background .12s,color .12s;}
.dd-item:hover{background:var(--bg-hover);color:var(--fg);}
.dd-item.danger:hover{background:rgba(255,83,112,.1);color:var(--red);}
.dd-sep{height:1px;background:var(--border);margin:3px 0;}

/* Saved Files Panel */
.saves-panel{position:fixed;inset:0;z-index:900;display:none;flex-direction:column;background:var(--bg);}
.saves-panel.show{display:flex;}
.saves-hd{display:flex;align-items:center;justify-content:space-between;height:50px;padding:0 16px;background:var(--bg-s);border-bottom:1px solid var(--border);flex-shrink:0;}
.saves-title{font-size:14px;font-weight:600;color:var(--fg);letter-spacing:.05em;}
.saves-close{width:32px;height:32px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--fg2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .12s,color .12s;}
.saves-close:hover{background:rgba(255,83,112,.12);color:var(--red);}
.saves-list{flex:1;overflow-y:auto;padding:12px;}
.save-empty{text-align:center;padding:48px 20px;color:var(--fg3);font-size:14px;line-height:1.7;}
.save-card{background:var(--bg-s);border:1px solid var(--border);border-radius:10px;padding:13px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;transition:border-color .15s;}
.save-card:hover{border-color:var(--bhi);}
.save-icon{width:36px;height:36px;border-radius:8px;background:rgba(199,146,234,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.save-info{flex:1;min-width:0;}
.save-name{font-family:var(--mono);font-size:13px;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.save-date{font-size:11px;color:var(--fg2);}
.save-actions{display:flex;gap:6px;flex-shrink:0;}
.save-load{padding:5px 12px;border-radius:6px;background:var(--acc);border:none;color:#000;font-size:12px;font-weight:600;cursor:pointer;transition:background .12s;}
.save-load:hover{background:#d9a8ff;}
.save-del{width:28px;height:28px;border-radius:6px;background:transparent;border:1px solid var(--border);color:var(--fg2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .12s,color .12s;}
.save-del:hover{background:rgba(255,83,112,.1);color:var(--red);border-color:rgba(255,83,112,.3);}

/* Preview – Full Screen Overlay */
.preview-overlay{position:fixed;inset:0;background:#000;z-index:800;display:none;}
.preview-overlay.show{display:block;}
.preview-frame{position:absolute;top:0;left:0;width:100%;height:100%;border:none;background:#000;}
.preview-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(20,20,20,.9);border:1px solid var(--bhi);color:var(--fg2);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:810;transition:background .12s,color .12s,border-color .12s;}
.preview-close:hover{background:rgba(255,83,112,.2);color:var(--red);border-color:rgba(255,83,112,.4);}

/* Toast */
.toast{position:fixed;bottom:calc(var(--tbh) + 16px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg-menu);border:1px solid var(--bhi);border-radius:8px;padding:8px 16px;font-size:13px;color:var(--fg);white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,.8);z-index:700;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Issue Detection Modal */
.issue-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 950;
  display: none; align-items: center; justify-content: center;
}
.issue-overlay.show { display: flex; }
.issue-modal {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; width: 90%; max-width: 520px; max-height: 80vh;
  display: flex; flex-direction: column; overflow: hidden;
  box-shadow: 0 12px 40px rgba(0,0,0,.9);
}
.issue-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  font-weight: 600; font-size: 14px; color: var(--fg);
}
.issue-close {
  background: none; border: none; color: var(--fg2);
  font-size: 18px; cursor: pointer; padding: 0 4px;
  transition: color .15s;
}
.issue-close:hover { color: var(--red); }
.issue-body {
  padding: 16px; overflow-y: auto; flex: 1;
  color: var(--fg); font-size: 13px; line-height: 1.6;
}
.issue-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.05);
}
.issue-item:last-child { border-bottom: none; }
.issue-icon { color: var(--yel); font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.issue-text { flex: 1; }
.issue-fix-btn {
  background: var(--bg-hover); border: 1px solid var(--bhi);
  color: var(--fg); border-radius: 6px; padding: 4px 10px;
  font-size: 11px; cursor: pointer; flex-shrink: 0;
  transition: background .12s, color .12s;
}
.issue-fix-btn:hover { background: var(--acc); color: #000; border-color: var(--acc); }
.issue-empty {
  text-align: center; padding: 20px; color: var(--green);
  font-size: 14px;
}
.issue-footer {
  display: flex; gap: 8px; padding: 14px 18px;
  border-top: 1px solid var(--border); justify-content: flex-end;
}
.issue-btn {
  padding: 8px 18px; border-radius: 8px; font-size: 13px;
  font-weight: 500; border: none; cursor: pointer;
  transition: background .12s, opacity .12s;
}
.issue-btn.primary { background: var(--acc); color: #000; }
.issue-btn.primary:hover { background: #d9a8ff; }
.issue-btn.secondary { background: var(--bg-hover); color: var(--fg); border: 1px solid var(--bhi); }
.issue-btn.secondary:hover { background: var(--bg-menu); }

/* Scrollbars */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:#3a3a3a;}

@media(max-width:480px){
  .tb-inner{padding:0 10px;}
}
</style>
</head>
<body>
<div class="shell">
  <header class="header">
    <div class="h-side l"></div>
    <span class="h-title">Editor</span>
    <div class="h-side r">
      <button class="play-btn" id="playBtn" title="Preview" aria-label="Preview">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
      </button>
    </div>
  </header>

  <div class="tabs-bar" id="tabsBar"></div>

  <div class="editor-wrap">
    <div class="line-nums" id="lineNums"></div>
    <div class="editor-inner">
      <div class="hl-layer" id="hlLayer" aria-hidden="true"></div>
      <textarea class="code-area" id="codeArea" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" aria-label="Code Editor" role="textbox" aria-multiline="true"></textarea>
    </div>
  </div>

  <footer class="toolbar">
    <div class="tb-inner">
      <div style="display:flex; align-items:center; gap:10px;">
        <button class="ic-btn" id="undoBtn" title="Undo" disabled aria-label="Undo">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>

        </button>

        <div class="sel-wrap">
          <button class="ic-btn" id="selAllBtn" title="Select All" aria-label="Select All">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
            </svg>
          </button>
          <div class="copy-tip" id="copyTip">
            <button class="copy-btn2" id="copyBtn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>Copy
            </button>
            <button class="tip-dismiss" id="tipDismiss">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
        </div>

        <button class="ic-btn" id="redoBtn" title="Redo" disabled aria-label="Redo">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/>
          </svg>
        </button>

        <div class="menu-wrap">
          <button class="ic-btn" id="menuBtn" title="Options" aria-label="Options">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/>
            </svg>
          </button>
          <div class="dropdown" id="dropdown">
            <button class="dd-item" id="saveBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
              </svg>Save Project
            </button>
            <button class="dd-item danger" id="deleteBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                <path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>

            </button>
            <button class="dd-item" id="renameBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
              </svg>Rename
            </button>
            <div class="dd-sep"></div>
            <button class="dd-item" id="addFileBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
              </svg>Add New File
            </button>
            <div class="dd-sep"></div>
            <button class="dd-item" id="openSavesBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
              </svg>Saved Files
            </button>
          </div>
        </div>
      </div>
    </div>
  </footer>
</div>

<!-- Saved Files Panel -->
<div class="saves-panel" id="savesPanel">
  <div class="saves-hd">
    <span class="saves-title">Saved Files</span>
    <button class="saves-close" id="savesClose" aria-label="Close saved files">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>

</div>

<!-- Preview Overlay -->
<div class="preview-overlay" id="previewOverlay">
  <button class="preview-close" id="closePreview" title="Close Preview" aria-label="Close preview">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
  <iframe class="preview-frame" id="previewFrame" title="Code Preview" sandbox="allow-scripts allow-same-origin"></iframe>
</div>

<!-- Issue Detection Modal -->

  <div class="issue-modal">
    <div class="issue-header">
      <span>🔍 تدقيق الكود قبل المعاينة</span>
      <button class="issue-close" id="issueClose" title="إغلاق">✕</button>
    </div>
    <div class="issue-body" id="issueBody">
      <!-- تُملأ بالمشاكل -->
    </div>
    <div class="issue-footer">
      <button class="issue-btn secondary" id="issuePreviewRaw">معاينة كما هي</button>
      <button class="issue-btn primary" id="issueFixAll">إصلاح الكل</button>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';

/* ═══════════ MIGRATION ═══════════ */
var DATA_VERSION = 2;
function migrateData() {
  var versionKey = 'ce_saves_version', dataKey = 'ce_saves_v1';
  var storedVersion = localStorage.getItem(versionKey);
  var currentVersion = parseInt(storedVersion, 10) || 0;
  if (currentVersion < 2 && localStorage.getItem(dataKey)) {
    try {
      var oldData = JSON.parse(localStorage.getItem(dataKey) || '[]');
      var newData = oldData.map(function(item) {
        if (!item.type) { item.type = item.files ? 'project' : 'file'; }
        return item;
      });
      localStorage.setItem(dataKey, JSON.stringify(newData));
    } catch(e) {}
    currentVersion = 2;
  }
  localStorage.setItem(versionKey, currentVersion);
}
migrateData();

/* ═══════════ HIGHLIGHTER ═══════════ */
var KW=new Set(['const','let','var','function','return','if','else','for','while','do',
  'switch','case','break','continue','new','delete','typeof','instanceof','in','of',
  'class','extends','import','export','default','async','await','try','catch','finally',
  'throw','this','super','null','undefined','true','false','void','yield','static',
  'get','set','from','debugger','with']);

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function highlight(code){
  var out=[],i=0,len=code.length,c,j,word;
  while(i<len){
    c=code[i];
    if(c==='/'&&code[i+1]==='/'){j=code.indexOf('\n',i);if(j===-1)j=len;out.push('<span class="cmt">'+esc(code.slice(i,j))+'</span>');i=j;continue;}
    if(c==='/'&&code[i+1]==='*'){j=code.indexOf('*/',i+2);j=j===-1?len:j+2;out.push('<span class="cmt">'+esc(code.slice(i,j))+'</span>');i=j;continue;}
    if(c==='"'||c==="'"||c==='`'){j=i+1;while(j<len){if(code[j]==='\\'){j+=2;continue;}if(code[j]===c){j++;break;}j++;}out.push('<span class="str">'+esc(code.slice(i,j))+'</span>');i=j;continue;}
    if(/\d/.test(c)&&(i===0||/\W/.test(code[i-1]))){j=i;if(code[j]==='0'&&(code[j+1]==='x'||code[j+1]==='X')){j+=2;while(j<len&&/[0-9a-fA-F]/.test(code[j]))j++;}else{while(j<len&&/[\d.eE]/.test(code[j]))j++;}out.push('<span class="num">'+esc(code.slice(i,j))+'</span>');i=j;continue;}
    if(/[a-zA-Z_$]/.test(c)){j=i+1;while(j<len&&/[\w$]/.test(code[j]))j++;word=code.slice(i,j);if(KW.has(word))out.push('<span class="kw">'+esc(word)+'</span>');else if(code[j]==='(')out.push('<span class="fn">'+esc(word)+'</span>');else if(/^[A-Z]/.test(word))out.push('<span class="cls">'+esc(word)+'</span>');else out.push(esc(word));i=j;continue;}
    out.push(esc(c));i++;
  }
  return out.join('');
}

/* ═══════════ RENDER ═══════════ */
function renderLineNums(text){
  var n = (text.match(/\n/g)||[]).length + 1;
  var h='';
  for(var i=1;i<=n;i++) h+='<div class="ln">'+i+'</div>';
  lineNums.innerHTML=h;
}
function renderHL(text){hlLayer.innerHTML=highlight(text);}
function updateBtns(){
  undoBtn.disabled=!(undoSt[activeId]&&undoSt[activeId].length>0);
  redoBtn.disabled=!(redoSt[activeId]&&redoSt[activeId].length>0);
}

function renderTabs(){
  tabsBar.innerHTML='';
  for(var i=0;i<files.length;i++){
    (function(f){
      var btn=document.createElement('button');
      btn.className='tab'+(f.id===activeId?' active':'');

      if(f.id === editingTabId){
        var input = document.createElement('input');
        input.type = 'text';
        input.value = f.name;
        input.style.cssText = 'background:transparent; border:none; outline:none; color:inherit; font:inherit; width:100%; padding:0; margin:0;';
        input.addEventListener('keydown', function(e){
          e.stopPropagation();
          if(e.key === 'Enter') finishRename(input.value.trim(), f.id);
          if(e.key === 'Escape') cancelRename();
        });
        input.addEventListener('blur', function(){
          finishRename(input.value.trim(), f.id);
        });
        btn.appendChild(input);
        setTimeout(function(){ input.focus(); input.select(); }, 20);
      } else {
        var sp=document.createElement('span');sp.textContent=f.name;btn.appendChild(sp);
      }

      if(files.length>1){
        var x=document.createElement('button');x.className='tab-x';x.title='Close';
        x.innerHTML='<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
        x.addEventListener('click',function(e){e.stopPropagation();closeTab(f.id);});
        btn.appendChild(x);
      }

      var pressStartTime = 0;
      var longPressed = false;

      function onTouchStart(e) {
        if (editingTabId !== null) return;
        pressStartTime = Date.now();
        longPressed = false;
      }

      function onTouchEnd(e) {
        if (!pressStartTime) return;
        var elapsed = Date.now() - pressStartTime;
        if (elapsed >= 500) {
          longPressed = true;
          if (f.id === activeId) startEditTabName(f.id);
          e.preventDefault();
        } else {
          longPressed = false;
        }
        pressStartTime = 0;
      }

      function onTouchCancel(e) {
        pressStartTime = 0;
        longPressed = false;
      }

      btn.addEventListener('mousedown', function(e) {
        if (editingTabId !== null) return;
        pressStartTime = Date.now();
        longPressed = false;
      });
      btn.addEventListener('mouseup', function(e) {
        if (!pressStartTime) return;
        var elapsed = Date.now() - pressStartTime;
        if (elapsed >= 500) {
          longPressed = true;
          if (f.id === activeId) startEditTabName(f.id);
        } else {
          longPressed = false;
        }
        pressStartTime = 0;
      });
      btn.addEventListener('mouseleave', function() { pressStartTime = 0; });

      btn.addEventListener('touchstart', onTouchStart, {passive: true});
      btn.addEventListener('touchend', onTouchEnd, {passive: false});
      btn.addEventListener('touchcancel', onTouchCancel, {passive: true});

      btn.addEventListener('click', function(e) {
        if (editingTabId !== null) return;
        if (longPressed) {
          longPressed = false;
          return;
        }
        if (e.target.closest('.tab-x')) return;
        if (f.id !== activeId) switchTab(f.id);
      });

      tabsBar.appendChild(btn);
    })(files[i]);
  }
}

/* ═══════════ TABS ═══════════ */
function switchTab(id){
  commitUndo();
  activeId=id;
  editingTabId = null;
  renderTabs();
  renderEditor();
  closeDropdown();
  copyTip.classList.remove('show');
}

function closeTab(id){
  if(files.length===1)return;
  if(editingTabId === id) editingTabId = null;
  files=files.filter(function(f){return f.id!==id;});
  delete undoSt[id];delete redoSt[id];
  if(activeId===id)activeId=files[files.length-1].id;
  renderTabs();renderEditor();
}

/* ═══════════ INLINE RENAME ═══════════ */
function startEditTabName(id){
  editingTabId = id;
  renderTabs();
}
function finishRename(newName, id){
  if(editingTabId !== id) return;
  newName = (newName || '').trim();
  if(newName){
    for(var k=0;k<files.length;k++){
      if(files[k].id === id){ files[k].name = newName; break; }
    }
  }
  editingTabId = null;
  renderTabs();
}
function cancelRename(){
  editingTabId = null;
  renderTabs();
}

/* ═══════════ UNDO / REDO ═══════════ */
function initSt(id){if(!undoSt[id])undoSt[id]=[];if(!redoSt[id])redoSt[id]=[];}
function pushUndo(snap){
  initSt(activeId);
  var st=undoSt[activeId];
  if(st.length&&st[st.length-1]===snap)return;
  st.push(snap);if(st.length>100)st.shift();
  redoSt[activeId]=[];
}
function commitUndo(){
  clearTimeout(undoTimer);
  var cur=codeArea.value;
  if(cur !== lastCommit){
    pushUndo(lastCommit);
    lastCommit = cur;
  }
}
function applyContent(val){
  for(var k=0;k<files.length;k++)if(files[k].id===activeId){files[k].content=val;break;}
  codeArea.value = val;
  renderHL(val);
  renderLineNums(val);
  updateBtns();
}
function doUndo(){
  commitUndo();initSt(activeId);
  var st=undoSt[activeId];if(!st.length)return;
  var prev=st.pop();redoSt[activeId].push(getFile().content);
  applyContent(prev);lastCommit=prev;
}
function doRedo(){
  initSt(activeId);
  var st=redoSt[activeId];if(!st.length)return;
  var next=st.pop();undoSt[activeId].push(getFile().content);
  applyContent(next);lastCommit=next;
}

codeArea.addEventListener('input',function(){
  var val=codeArea.value;
  for(var k=0;k<files.length;k++)if(files[k].id===activeId){files[k].content=val;break;}
  renderHL(val);renderLineNums(val);
  clearTimeout(undoTimer);
  var snap=lastCommit;
  undoTimer=setTimeout(function(){
    if(val!==snap){pushUndo(snap);lastCommit=val;updateBtns();}
  },600);
});

codeArea.addEventListener('scroll',function(){
  hlLayer.scrollTop=codeArea.scrollTop;

});

codeArea.addEventListener('keydown',function(e){
  if(e.key==='Tab'){
    e.preventDefault();
    var s=codeArea.selectionStart,en=codeArea.selectionEnd,v=codeArea.value;
    var nv=v.slice(0,s)+'  '+v.slice(en);
    commitUndo();codeArea.value=nv;codeArea.selectionStart=codeArea.selectionEnd=s+2;
    for(var k=0;k<files.length;k++)if(files[k].id===activeId){files[k].content=nv;break;}
    renderHL(nv);renderLineNums(nv);lastCommit=nv;return;
  }
  if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&e.key==='z'){e.preventDefault();doUndo();return;}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='z'))){e.preventDefault();doRedo();return;}
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();doSave();return;}
  if((e.ctrlKey||e.metaKey)&&e.key==='a'){setTimeout(function(){copyTip.classList.add('show');},50);}
});

/* ═══════════ UNIVERSAL MULTI-FILE PREVIEW ═══════════ */
function buildMultiFilePreview(){
  var activeFile = getFile();
  var baseFile = null;
  if (/\.html$/i.test(activeFile.name)) { baseFile = activeFile; }
  else {
    for (var i = 0; i < files.length; i++) {
      if (/\.html$/i.test(files[i].name)) { baseFile = files[i]; break; }
    }
  }
  if (!baseFile) return activeFile.content;

  var htmlContent = baseFile.content;
  var cssTags = '', jsTags = '';
  for (var i = 0; i < files.length; i++) {
    var file = files[i];
    if (file.id === baseFile.id) continue;
    var nameLower = file.name.toLowerCase();
    if (nameLower.endsWith('.css')) { cssTags += '\n<style>\n' + file.content + '\n</style>\n'; }
    else if (nameLower.endsWith('.js')) { jsTags += '\n<script>\n' + file.content + '\n<\/script>\n'; }
  }

  if (!/<head/i.test(htmlContent) && !/<body/i.test(htmlContent)) {
    htmlContent = '<!DOCTYPE html>\n<html><head><meta charset="UTF-8"></head><body>\n' + htmlContent + '\n</body></html>';
  }

  var result = htmlContent;
  if (cssTags) result = result.replace(/<\/head>/i, cssTags + '</head>');
  if (jsTags) result = result.replace(/<\/body>/i, jsTags + '</body>');
  return result;
}

/* ═══════════ ISSUE DETECTION & FIX ═══════════ */
var detectedIssues = [];
var previewContentCache = '';

function detectIssues(html) {
  var issues = [];
  var cleaned = html;

  // 1. Markdown code fences
  if (/```/.test(cleaned)) {
    issues.push({
      type: 'markdown',
      message: 'يحتوي على علامات Markdown (```)، قد تمنع العرض الصحيح.',
      fix: function(h) { return h.replace(/```[\w-]*\s*\n?/g, '').replace(/```/g, ''); }
    });
  }

  // 2. Missing <!DOCTYPE html>
  if (!/<!DOCTYPE\s+html/i.test(cleaned)) {
    issues.push({
      type: 'no-doctype',
      message: 'لا يوجد <!DOCTYPE html>. قد يعمل المتصفح في وضع المراوغات (quirks mode).',
      fix: function(h) { return '<!DOCTYPE html>\n' + h; }
    });
  }

  // 3. Missing <html> tag
  if (!/<html[\s>]/i.test(cleaned)) {
    issues.push({
      type: 'no-html-tag',
      message: 'لا يوجد وسم <html>. ستتم إضافته.',
      fix: function(h) { return '<!DOCTYPE html>\n<html>\n' + h + '\n</html>'; }
    });
  }

  // 4. Missing <head> and <body> but has other tags
  var hasTags = /<[a-zA-Z][^>]*>/.test(cleaned);
  if (hasTags && !/<head[\s>]/i.test(cleaned) && !/<body[\s>]/i.test(cleaned)) {
    issues.push({
      type: 'no-head-body',
      message: 'يحتوي وسوماً HTML لكن بدون <head> أو <body>. سيتم إضافتهما.',
      fix: function(h) {
        return h.replace(/(<html[^>]*>)/i, '$1\n<head><meta charset="UTF-8"></head>\n<body>')
                .replace(/<\/html>/i, '</body>\n</html>');
      }
    });
  }

  // 5. Duplicate structural tags
  var countTag = function(tag, h) {
    return (h.match(new RegExp('<' + tag + '[\\s>]', 'gi')) || []).length;
  };
  ['html', 'head', 'body'].forEach(function(tag) {
    if (countTag(tag, cleaned) > 1) {
      issues.push({
        type: 'duplicate-' + tag,
        message: 'يوجد أكثر من وسم <' + tag + '>. قد يسبب سلوكاً غير متوقع.',
        fix: null
      });
    }
  });

  // 6. Missing <meta charset>
  if (hasTags && /<head/i.test(cleaned) && !/<meta[^>]*charset/i.test(cleaned)) {
    issues.push({
      type: 'no-charset',
      message: 'لا يوجد <meta charset="UTF-8">. قد تظهر الرموز العربية مشوهة.',
      fix: function(h) {
        return h.replace(/(<head[^>]*>)/i, '$1\n<meta charset="UTF-8">');
      }
    });
  }

  // 7. Missing viewport
  if (hasTags && /<head/i.test(cleaned) && !/<meta[^>]*name\s*=\s*["']viewport["'][^>]*>/i.test(cleaned)) {
    issues.push({
      type: 'no-viewport',
      message: 'لا يوجد <meta viewport>. التصميم لن يتجاوب على الجوال.',
      fix: function(h) {
        return h.replace(/(<head[^>]*>)/i, '$1\n<meta name="viewport" content="width=device-width, initial-scale=1.0">');
      }
    });
  }

  // 8. Missing <title>
  if (hasTags && /<head/i.test(cleaned) && !/<title[^>]*>/i.test(cleaned)) {
    issues.push({
      type: 'no-title',
      message: 'لا يوجد وسم <title> في الرأس.',
      fix: function(h) {
        return h.replace(/<\/head>/i, '<title>Preview</title>\n</head>');
      }
    });
  }

  // 9. Multiple <title>
  if ((cleaned.match(/<title[^>]*>/gi) || []).length > 1) {
    issues.push({ type: 'multi-title', message: 'يوجد أكثر من وسم <title>.', fix: null });
  }

  // 10. Pure CSS
  if (!hasTags && /[{;]\s*\n?\s*[a-zA-Z-]+\s*:/.test(cleaned)) {
    issues.push({
      type: 'pure-css',
      message: 'يبدو أنه كود CSS خالص. سيتم تغليفه بصفحة.',
      fix: function(h) {
        return '<!DOCTYPE html>\n<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">\n<style>\n' + h + '\n</style></head><body></body></html>';
      }
    });
  }

  // 11. CSS outside <style>
  if (hasTags && /\b[a-zA-Z-]+\s*:\s*[^;]+;/.test(cleaned) && !/<style[^>]*>/i.test(cleaned)) {
    issues.push({
      type: 'css-outside-style',
      message: 'توجد خواص CSS خارج وسم <style>. قد لا تعمل.',
      fix: function(h) {
        var cssBlocks = h.match(/\b[a-zA-Z-]+\s*:\s*[^;]+;/g);
        if (cssBlocks) {
          var styleTag = '\n<style>\n' + cssBlocks.join('\n') + '\n</style>\n';
          return h.replace(/(<head[^>]*>)/i, '$1' + styleTag);
        }
        return h;
      }
    });
  }

  // 12. CSS missing units
  var unitless = cleaned.match(/:\s*\d+(?![a-zA-Z%])\s*;/g);
  if (unitless && unitless.length) {
    issues.push({
      type: 'css-no-unit',
      message: 'قيم CSS بدون وحدة (مثل width:100;). قد لا تعمل. مثال: ' + unitless[0],
      fix: null
    });
  }

  // 13. @import with http
  if (/@import\s+url\(["']?http:/.test(cleaned)) {
    issues.push({
      type: 'css-import-http',
      message: 'يوجد @import برابط http، وقد يُمنع.',
      fix: null
    });
  }

  // 14. Empty <style>
  if (/<style[^>]*>\s*<\/style>/gi.test(cleaned)) {
    issues.push({ type: 'empty-style', message: 'هناك وسم <style> فارغ.', fix: null });
  }

  // 15. Pure JS
  if (!hasTags && /\b(function|const|let|var|=>|console\.log|alert|document\.)\b/.test(cleaned)) {
    issues.push({
      type: 'pure-js',
      message: 'يبدو أنه كود JavaScript خالص. سيتم تغليفه بصفحة.',
      fix: function(h) {
        return '<!DOCTYPE html>\n<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"></head><body>\n<script>\n' + h + '\n<\/script></body></html>';
      }
    });
  }

  // 16. JS outside <script>
  if (hasTags && /\b(function|const|let|var|=>|console\.log)\b/.test(cleaned) && !/<script[^>]*>/i.test(cleaned)) {
    issues.push({
      type: 'js-outside-script',
      message: 'كود JavaScript مبعثر خارج وسم <script>. قد لا ينفذ.',
      fix: function(h) {
        var jsPattern = /(?:function\s+\w+\s*\(.*?\)\s*\{[^}]*\}|const\s+\w+\s*=\s*[^;]+;|let\s+\w+\s*=\s*[^;]+;|var\s+\w+\s*=\s*[^;]+;|console\.log\([^)]*\);?)/g;
        var jsCode = h.match(jsPattern);
        if (jsCode) {
          var scriptTag = '\n<script>\n' + jsCode.join('\n') + '\n<\/script>\n';
          return h.replace(/<\/body>/i, scriptTag + '</body>');
        }
        return h;
      }
    });
  }

  // 17. Script src http
  if (/<script[^>]+src\s*=\s*["']http:/.test(cleaned)) {
    issues.push({
      type: 'script-src-http',
      message: 'سكريبت خارجي من رابط http قد يمنع.',
      fix: null
    });
  }

  // 18. document.write
  if (/document\.write\s*\(/.test(cleaned)) {
    issues.push({
      type: 'document-write',
      message: 'استخدام document.write قد يفشل في المعاينة.',
      fix: null
    });
  }

  // 19. Bracket balance in JS
  var jsCode = '';
  var scriptMatches = cleaned.match(/<script[^>]*>([\s\S]*?)<\/script>/gi);
  if (scriptMatches) {
    jsCode = scriptMatches.join('');
  }
  var countChar = function(code, ch) { return (code.match(new RegExp('\\' + ch, 'g')) || []).length; };
  if (countChar(jsCode, '(') !== countChar(jsCode, ')')) {
    issues.push({ type: 'js-paren-mismatch', message: 'الأقواس ( ) غير متطابقة في JavaScript.', fix: null });
  }
  if (countChar(jsCode, '{') !== countChar(jsCode, '}')) {
    issues.push({ type: 'js-brace-mismatch', message: 'الأقواس { } غير متطابقة في JavaScript.', fix: null });
  }
  if (countChar(jsCode, '[') !== countChar(jsCode, ']')) {
    issues.push({ type: 'js-bracket-mismatch', message: 'الأقواس [ ] غير متطابقة في JavaScript.', fix: null });
  }

  // 20. console.log without visible console
  if (/console\.log\(/.test(cleaned)) {
    issues.push({
      type: 'console-log',
      message: 'الكود يستخدم console.log، ولكن لا توجد نافذة Console في المعاينة.',
      fix: null
    });
  }

  // 21. Mismatched HTML tags
  var tagRegex = /<(\/?)([a-zA-Z][a-zA-Z0-9]*)[^>]*>/g;
  var tagCounts = {};
  var match;
  while ((match = tagRegex.exec(cleaned)) !== null) {
    var tagName = match[2].toLowerCase();
    var isClosing = match[1] === '/';
    if (['br','hr','img','input','meta','link','area','base','col','embed','source','track','wbr'].indexOf(tagName) !== -1) continue;
    if (!tagCounts[tagName]) tagCounts[tagName] = { open: 0, close: 0 };
    if (isClosing) tagCounts[tagName].close++;
    else tagCounts[tagName].open++;
  }
  var mismatched = [];
  for (var t in tagCounts) {
    if (tagCounts[t].open !== tagCounts[t].close) {
      mismatched.push(t + ' (' + tagCounts[t].open + '/' + tagCounts[t].close + ')');
    }
  }
  if (mismatched.length) {
    issues.push({
      type: 'tag-mismatch',
      message: 'وسوم غير متطابقة: ' + mismatched.join(', '),
      fix: null
    });
  }

  // 22. Self-closing block tags
  if (/<(div|span|p|section|article|nav|header|footer|main|aside)\s[^>]*\/\s*>/gi.test(cleaned)) {
    issues.push({
      type: 'self-closing-block',
      message: 'وسوم بلوك ذاتية الإغلاق (مثل <div/>) قد تفسر بشكل خاطئ.',
      fix: null
    });
  }

  // 23. Duplicate IDs
  var ids = cleaned.match(/id\s*=\s*["']([^"']+)["']/gi) || [];
  var idNames = ids.map(function(x) { return x.replace(/id\s*=\s*["']/i, '').replace(/["']/g, ''); });
  var duplicates = idNames.filter(function(id, idx) { return idNames.indexOf(id) !== idx; });
  if (duplicates.length) {
    issues.push({
      type: 'duplicate-id',
      message: 'معرفات id مكررة: ' + duplicates.slice(0,3).join(', '),
      fix: null
    });
  }

  // 24. Image without alt
  var imgs = cleaned.match(/<img[^>]*>/gi) || [];
  var noAlt = imgs.filter(function(img) { return !/alt\s*=/i.test(img); });
  if (noAlt.length) {
    issues.push({
      type: 'img-no-alt',
      message: 'عدد ' + noAlt.length + ' صورة بدون سمة alt.',
      fix: null
    });
  }

  // 25. Obsolete tags
  var obsolete = cleaned.match(/<(center|font|marquee)[\s>]/gi);
  if (obsolete) {
    issues.push({
      type: 'obsolete-tags',
      message: 'وسوم قديمة غير مدعومة جيداً: ' + obsolete.join(', '),
      fix: null
    });
  }

  // 26. Unescaped entities
  if (/&(?![a-zA-Z]{2,10};|#\d{1,4};|#x[0-9a-fA-F]+;)/.test(cleaned)) {
    issues.push({
      type: 'unescaped-entities',
      message: 'رموز & غير محولة لكيانات HTML. قد تسبب أخطاء.',
      fix: null
    });
  }

  // 27. Extraneous text outside HTML
  var textOnly = cleaned.replace(/<[^>]*>/g, '');
  if (!hasTags && textOnly.trim().length > 0) {
    // already pure text, not necessarily an issue
  } else if (textOnly.trim().length > 0 && /[a-zA-Z]{3,}/.test(textOnly)) {
    issues.push({
      type: 'extraneous-text',
      message: 'يوجد نص خارج وسوم HTML قد يكون شرحاً أو بقايا.',
      fix: null
    });
  }

  return issues;
}

function renderIssueModal(issues, previewContent) {
  if (!issues.length) {
    issueBody.innerHTML = '<div class="issue-empty">✅ لا توجد مشاكل، الكود جاهز للمعاينة.</div>';
    issueFixAll.style.display = 'none';
    issuePreviewRaw.style.display = 'none';
    setTimeout(function() {
      issueOverlay.classList.remove('show');
      openPreviewWithContent(previewContent);
    }, 400);
  } else {
    var html = '';
    for (var i = 0; i < issues.length; i++) {
      var iss = issues[i];
      html += '<div class="issue-item">';
      html += '<span class="issue-icon">⚠️</span>';
      html += '<span class="issue-text">' + iss.message + '</span>';
      if (iss.fix) {
        html += '<button class="issue-fix-btn" data-issue-idx="' + i + '">إصلاح</button>';
      } else {
        html += '<span style="color: var(--fg3); font-size:11px;">يدوي</span>';
      }
      html += '</div>';
    }
    issueBody.innerHTML = html;
    issueFixAll.style.display = 'inline-block';
    issuePreviewRaw.style.display = 'inline-block';

    var fixBtns = issueBody.querySelectorAll('.issue-fix-btn');
    for (var b = 0; b < fixBtns.length; b++) {
      fixBtns[b].addEventListener('click', function(e) {
        var idx = parseInt(this.getAttribute('data-issue-idx'));
        var issue = detectedIssues[idx];
        if (issue && issue.fix) {
          previewContentCache = issue.fix(previewContentCache);
          detectedIssues = detectIssues(previewContentCache);
          renderIssueModal(detectedIssues, previewContentCache);
        }
      });
    }
  }
}

function openPreviewWithContent(content) {
  previewFrame.srcdoc = content;
  previewOverlay.classList.add('show');
}

function handlePlayClick() {
  var combined = buildMultiFilePreview();
  previewContentCache = combined;
  detectedIssues = detectIssues(combined);

  if (detectedIssues.length === 0) {
    openPreviewWithContent(combined);
  } else {
    renderIssueModal(detectedIssues, combined);
    issueOverlay.classList.add('show');
  }
}
playBtn.addEventListener('click', handlePlayClick);

issueClose.addEventListener('click', function() {
  issueOverlay.classList.remove('show');
});
issuePreviewRaw.addEventListener('click', function() {
  issueOverlay.classList.remove('show');
  openPreviewWithContent(previewContentCache);
});
issueFixAll.addEventListener('click', function() {
  for (var i = 0; i < detectedIssues.length; i++) {
    if (detectedIssues[i].fix) {
      previewContentCache = detectedIssues[i].fix(previewContentCache);
    }
  }
  detectedIssues = detectIssues(previewContentCache);
  if (detectedIssues.length === 0) {
    issueOverlay.classList.remove('show');
    openPreviewWithContent(previewContentCache);
  } else {
    renderIssueModal(detectedIssues, previewContentCache);
  }
});
issueOverlay.addEventListener('click', function(e) {
  if (e.target === issueOverlay) {
    issueOverlay.classList.remove('show');
  }
});

/* ═══════════ ESCAPE KEY HANDLING ═══════════ */
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    if(issueOverlay.classList.contains('show')){
      issueOverlay.classList.remove('show');
      return;
    }
    if(savesPanel.classList.contains('show')){
      savesPanel.classList.remove('show');
      return;
    }
    if(previewOverlay.classList.contains('show')){
      previewOverlay.classList.remove('show');
      previewFrame.srcdoc = '';
      return;
    }
    if(editingTabId !== null){
      cancelRename();
      return;
    }
    closeDropdown();
  }
});

/* ═══════════ RENDER EDITOR ═══════════ */
function renderEditor(){
  var f = getFile();
  codeArea.value = f.content;
  renderHL(f.content);
  renderLineNums(f.content);
  updateBtns();
  lastCommit = f.content;
}

/* ═══════════ INIT ═══════════ */
renderTabs();
renderEditor();

})();
</script>
</body>
