<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Code Editor</title>
<style>
/* ─── Reset ─── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

:root {
  --bg:        #000000;
  --bg-s:      #0a0a0a;
  --bg-card:   #111111;
  --bg-hover:  #1a1a1a;
  --bg-menu:   #141414;
  --border:    #222222;
  --border-hi: #2e2e2e;
  --fg:        #e4e4e4;
  --fg-dim:    #777777;
  --fg-muted:  #3a3a3a;
  --accent:    #c792ea;
  --green:     #c3e88d;
  --blue:      #82aaff;
  --orange:    #f78c6c;
  --yellow:    #ffcb6b;
  --red:       #ff5370;
  --teal:      #89ddff;
  --header-h:  50px;
  --tabs-h:    36px;
  --toolbar-h: 70px;
  --font-mono: 'Cascadia Code','Fira Code','JetBrains Mono','Courier New',monospace;
}

html {
  height: 100%;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

body {
  height: 100%;
  width: 100%;
  overflow: hidden;
  background: #000;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: var(--fg);
  -webkit-font-smoothing: antialiased;
}

button {
  cursor: pointer;
  font-family: inherit;
  -webkit-user-select: none;
  user-select: none;
}

/* ─── Shell ─── */
.shell {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  width: 100vw;
  background: var(--bg);
  overflow: hidden;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
}

/* ─── Header ─── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: var(--header-h);
  background: var(--bg-s);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.header-side { width: 44px; display: flex; align-items: center; }
.header-side.right { justify-content: flex-end; }

.header-title {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.07em;
  color: var(--fg);
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.play-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--accent);
  border: none;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, transform .1s;
  flex-shrink: 0;
}
.play-btn:hover  { background: #d9a8ff; }
.play-btn:active { transform: scale(0.92); }
.play-btn svg    { margin-left: 2px; display: block; }

/* ─── Tabs Bar ─── */
.tabs-bar {
  display: flex;
  align-items: stretch;
  height: var(--tabs-h);
  background: var(--bg-s);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  overflow-y: hidden;
  flex-shrink: 0;
  scrollbar-width: none;
}
.tabs-bar::-webkit-scrollbar { display: none; }

.tab {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 0 14px;
  height: 100%;
  background: transparent;
  border: none;
  border-right: 1px solid var(--border);
  color: var(--fg-dim);
  font-family: var(--font-mono);
  font-size: 12px;
  white-space: nowrap;
  flex-shrink: 0;
  cursor: pointer;
  transition: color .12s, background .12s;
  position: relative;
}
.tab:hover { color: var(--fg); background: var(--bg-hover); }
.tab.active {
  color: var(--fg);
  background: var(--bg);
}
.tab.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent);
}

.tab-x {
  display: flex; align-items: center; justify-content: center;
  width: 16px; height: 16px;
  border-radius: 4px;
  background: transparent;
  border: none;
  color: var(--fg-muted);
  padding: 0;
  cursor: pointer;
  transition: color .12s, background .12s;
  flex-shrink: 0;
}
.tab-x:hover { color: var(--red); background: rgba(255,83,112,.14); }

/* ─── Editor Area ─── */
.editor-wrap {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-height: 0;
  background: var(--bg);
}

.line-nums {
  width: 52px;
  flex-shrink: 0;
  background: var(--bg-s);
  border-right: 1px solid var(--border);
  padding: 14px 0 14px 0;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  text-align: right;
}
.ln {
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.6;
  color: var(--fg-muted);
  padding-right: 10px;
}

.editor-inner {
  flex: 1;
  position: relative;
  overflow: hidden;
}

/* Both layers must share identical box model */
.hl-layer,
.code-area {
  position: absolute;
  inset: 0;
  padding: 14px 14px 14px 14px;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.6;
  white-space: pre;
  overflow: auto;
  tab-size: 2;
  word-spacing: normal;
  letter-spacing: normal;
  -moz-tab-size: 2;
}

.hl-layer {
  color: var(--fg);
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
  word-break: break-all;
}

.code-area {
  z-index: 2;
  background: transparent;
  color: transparent;
  caret-color: var(--accent);
  border: none;
  outline: none;
  resize: none;
  width: 100%;
  height: 100%;
  /* 16px prevents iOS Safari zoom on focus */
  font-size: 16px;
  -webkit-text-fill-color: transparent;
  -webkit-user-select: text;
  user-select: text;
  /* override touch-action for scrollable textarea */
  touch-action: pan-x pan-y;
}
/* Scale textarea back down visually while keeping 16px for iOS */
.code-area {
  transform-origin: top left;
  transform: scale(0.8125); /* 13/16 = 0.8125 */
  width: calc(100% / 0.8125);
  height: calc(100% / 0.8125);
}

.code-area::selection {
  background: rgba(199,146,234,.25);
  -webkit-text-fill-color: transparent;
}

/* ─── Syntax Colors ─── */
.kw  { color: var(--accent); font-style: italic; }
.str { color: var(--green); }
.cmt { color: #3d3d3d; font-style: italic; }
.num { color: var(--orange); }
.fn  { color: var(--blue); }
.cls { color: var(--yellow); }

/* ─── Toolbar ─── */
.toolbar {
  height: var(--toolbar-h);
  background: var(--bg-s);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 10;
}

.tb-inner {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  max-width: 520px;
  padding: 0 16px;
}

.tb-group {
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 1;
}

.tb-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 1;
}

.ic-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 1px solid var(--border-hi);
  color: var(--fg-dim);
  display: flex; align-items: center; justify-content: center;
  transition: background .12s, color .12s, transform .1s, border-color .12s;
  flex-shrink: 0;
}
.ic-btn:hover:not(:disabled) {
  background: var(--bg-hover);
  color: var(--fg);
  border-color: #444;
}
.ic-btn:active:not(:disabled) { transform: scale(0.9); }
.ic-btn:disabled { opacity: .25; cursor: not-allowed; }

.editor-pill {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 9px 22px;
  border-radius: 30px;
  background: var(--accent);
  border: none;
  color: #000;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  transition: background .15s, transform .1s;
  flex-shrink: 0;
}
.editor-pill:hover  { background: #d9a8ff; }
.editor-pill:active { transform: scale(0.95); }

/* ─── Copy Tooltip ─── */
.sel-wrap { position: relative; }

.copy-tip {
  position: absolute;
  bottom: calc(100% + 12px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-menu);
  border: 1px solid var(--border-hi);
  border-radius: 8px;
  padding: 6px 10px;
  display: none;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  box-shadow: 0 6px 24px rgba(0,0,0,.8);
  z-index: 500;
}
.copy-tip.show { display: flex; }
.copy-tip::after {
  content: '';
  position: absolute;
  top: 100%; left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: var(--border-hi);
}

.copy-btn2 {
  display: flex; align-items: center; gap: 5px;
  background: none; border: none;
  color: var(--fg);
  font-size: 12px; font-weight: 500;
  padding: 0; cursor: pointer;
  transition: color .12s;
}
.copy-btn2:hover { color: var(--accent); }

.tip-dismiss {
  display: flex; align-items: center;
  background: none; border: none;
  color: var(--fg-dim); padding: 0; cursor: pointer;
  transition: color .12s;
}
.tip-dismiss:hover { color: var(--fg); }

/* ─── Dropdown ─── */
.menu-wrap { position: relative; }

.dropdown {
  position: absolute;
  bottom: calc(100% + 12px);
  right: 0;
  background: var(--bg-menu);
  border: 1px solid var(--border-hi);
  border-radius: 10px;
  overflow: hidden;
  min-width: 176px;
  box-shadow: 0 12px 36px rgba(0,0,0,.9);
  z-index: 500;
  display: none;
}
.dropdown.show { display: block; }

.dd-item {
  display: flex; align-items: center; gap: 9px;
  width: 100%; padding: 10px 14px;
  background: none; border: none;
  color: var(--fg-dim); font-size: 13px;
  text-align: left; cursor: pointer;
  transition: background .12s, color .12s;
}
.dd-item:hover         { background: var(--bg-hover); color: var(--fg); }
.dd-item.danger:hover  { background: rgba(255,83,112,.1); color: var(--red); }

.dd-sep { height: 1px; background: var(--border); margin: 3px 0; }

.rename-row {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 7px 10px;
}
.rename-row.show { display: flex; }

.rename-input {
  flex: 1; min-width: 0;
  background: var(--bg-s);
  border: 1px solid var(--border-hi);
  border-radius: 6px;
  color: var(--fg);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 5px 8px;
  outline: none;
  /* 16px to prevent iOS zoom */
  font-size: 16px;
  transition: border-color .12s;
}
.rename-input:focus { border-color: var(--accent); }

.rename-ok {
  width: 28px; height: 28px;
  border-radius: 6px;
  background: var(--accent);
  border: none; color: #000;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  cursor: pointer;
  transition: background .12s;
}
.rename-ok:hover { background: #d9a8ff; }

/* ─── Preview Modal ─── */
.preview-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.88);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
}
.preview-overlay.show { display: flex; }

.preview-panel {
  display: flex;
  flex-direction: column;
  width: min(96vw, 920px);
  height: min(92vh, 720px);
  background: var(--bg-s);
  border: 1px solid var(--border-hi);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 28px 80px rgba(0,0,0,.95);
}

.preview-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
  height: 46px;
  background: var(--bg-s);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.preview-label {
  font-size: 11px; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--fg-dim);
}
.close-x {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--fg-dim);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background .12s, color .12s, border-color .12s;
}
.close-x:hover { background: rgba(255,83,112,.12); color: var(--red); border-color: rgba(255,83,112,.3); }

.preview-frame {
  flex: 1; border: none; width: 100%; min-height: 0; background: #000;
}

/* ─── Scrollbars ─── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }

/* ─── Mobile ─── */
@media (max-width: 480px) {
  .preview-panel { width: 100vw; height: 100dvh; border-radius: 0; border: none; }
  .tb-inner { padding: 0 10px; }
  .editor-pill { padding: 8px 16px; }
}
</style>
</head>
<body>

<div class="shell">

  <!-- Header -->
  <header class="header">
    <div class="header-side left"></div>
    <span class="header-title">Editor</span>
    <div class="header-side right">
      <button class="play-btn" id="playBtn" title="Preview">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Tabs -->
  <div class="tabs-bar" id="tabsBar"></div>

  <!-- Editor -->
  <div class="editor-wrap">
    <div class="line-nums" id="lineNums"></div>
    <div class="editor-inner">
      <div class="hl-layer" id="hlLayer" aria-hidden="true"></div>
      <textarea
        class="code-area" id="codeArea"
        spellcheck="false"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        autocomplete="off"
      ></textarea>
    </div>
  </div>

  <!-- Toolbar -->
  <footer class="toolbar">
    <div class="tb-inner">

      <!-- Left: Undo / Redo -->
      <div class="tb-group">
        <button class="ic-btn" id="undoBtn" title="Undo" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 7v6h6"/>
            <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>
          </svg>
        </button>
        <button class="ic-btn" id="redoBtn" title="Redo" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 7v6h-6"/>
            <path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/>
          </svg>
        </button>
      </div>

      <!-- Center: Select-All + Editor pill -->
      <div class="tb-center">
        <div class="sel-wrap">
          <button class="ic-btn" id="selAllBtn" title="Select All">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"/>
              <rect x="14" y="3" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/>
            </svg>
          </button>
          <div class="copy-tip" id="copyTip">
            <button class="copy-btn2" id="copyBtn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
              Copy
            </button>
            <button class="tip-dismiss" id="tipDismiss">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
        </div>

        <button class="editor-pill" id="editorPill" title="Editor">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          Editor
        </button>
      </div>

      <!-- Right: File menu -->
      <div class="tb-group">
        <div class="menu-wrap">
          <button class="ic-btn" id="menuBtn" title="File options">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <circle cx="5"  cy="12" r="1.5"/>
              <circle cx="12" cy="12" r="1.5"/>
              <circle cx="19" cy="12" r="1.5"/>
            </svg>
          </button>

          <div class="dropdown" id="dropdown">
            <!-- Save -->
            <button class="dd-item" id="saveBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
              </svg>
              Save Code
            </button>
            <!-- Delete -->
            <button class="dd-item danger" id="deleteBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                <path d="M10 11v6M14 11v6"/>
                <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
              </svg>
              Delete Code
            </button>
            <!-- Rename -->
            <button class="dd-item" id="renameBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 20h9"/>
                <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
              </svg>
              Rename
            </button>
            <div class="rename-row" id="renameRow">
              <input class="rename-input" id="renameInput" type="text" placeholder="filename.js"/>
              <button class="rename-ok" id="renameOk">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2.5">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
              </button>
            </div>
            <div class="dd-sep"></div>
            <!-- Add File -->
            <button class="dd-item" id="addFileBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="12" y1="18" x2="12" y2="12"/>
                <line x1="9"  y1="15" x2="15" y2="15"/>
              </svg>
              Add New File
            </button>
          </div>
        </div>
      </div>

    </div>
  </footer>
</div>

<!-- Preview Modal -->
<div class="preview-overlay" id="previewOverlay">
  <div class="preview-panel">
    <div class="preview-hd">
      <span class="preview-label">Preview</span>
      <button class="close-x" id="closePreview" title="Close (Esc)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <iframe class="preview-frame" id="previewFrame"
      title="Code Preview" sandbox="allow-scripts"></iframe>
  </div>
</div>

<script>
(function () {
'use strict';

/* ═══════════════════════════
   HIGHLIGHTER
═══════════════════════════ */
var KW = new Set([
  'const','let','var','function','return','if','else','for','while','do',
  'switch','case','break','continue','new','delete','typeof','instanceof',
  'in','of','class','extends','import','export','default','async','await',
  'try','catch','finally','throw','this','super','null','undefined','true',
  'false','void','yield','static','get','set','from','debugger','with',
]);

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(code) {
  var out = [], i = 0, len = code.length, c, j, word;
  while (i < len) {
    c = code[i];

    /* line comment */
    if (c === '/' && code[i+1] === '/') {
      j = code.indexOf('\n', i); if (j === -1) j = len;
      out.push('<span class="cmt">' + esc(code.slice(i, j)) + '</span>');
      i = j; continue;
    }
    /* block comment */
    if (c === '/' && code[i+1] === '*') {
      j = code.indexOf('*/', i+2); j = j === -1 ? len : j + 2;
      out.push('<span class="cmt">' + esc(code.slice(i, j)) + '</span>');
      i = j; continue;
    }
    /* string / template */
    if (c === '"' || c === "'" || c === '`') {
      j = i + 1;
      while (j < len) {
        if (code[j] === '\\' && j+1 < len) { j += 2; continue; }
        if (code[j] === c) { j++; break; }
        j++;
      }
      out.push('<span class="str">' + esc(code.slice(i, j)) + '</span>');
      i = j; continue;
    }
    /* regex literal (simple: after = ( , [ ! & | ? : ; newline) */
    if (c === '/' && i > 0) {
      var prev = code[i-1];
      if ('=([,!&|?:;\n'.indexOf(prev) !== -1) {
        j = i + 1;
        while (j < len) {
          if (code[j] === '\\' && j+1 < len) { j += 2; continue; }
          if (code[j] === '/') { j++; break; }
          if (code[j] === '\n') break;
          j++;
        }
        /* consume flags */
        while (j < len && /[gimsuy]/.test(code[j])) j++;
        out.push('<span class="str">' + esc(code.slice(i, j)) + '</span>');
        i = j; continue;
      }
    }
    /* number */
    if (/\d/.test(c) && (i === 0 || /\W/.test(code[i-1]))) {
      j = i;
      if (code[j] === '0' && (code[j+1] === 'x' || code[j+1] === 'X')) {
        j += 2; while (j < len && /[0-9a-fA-F]/.test(code[j])) j++;
      } else {
        while (j < len && /[\d.eE+\-]/.test(code[j])) j++;
      }
      out.push('<span class="num">' + esc(code.slice(i, j)) + '</span>');
      i = j; continue;
    }
    /* identifier / keyword */
    if (/[a-zA-Z_$]/.test(c)) {
      j = i + 1;
      while (j < len && /[\w$]/.test(code[j])) j++;
      word = code.slice(i, j);
      var isCall  = code[j] === '(';
      var isUpper = /^[A-Z]/.test(word);
      if (KW.has(word))      out.push('<span class="kw">'  + esc(word) + '</span>');
      else if (isCall)       out.push('<span class="fn">'  + esc(word) + '</span>');
      else if (isUpper)      out.push('<span class="cls">' + esc(word) + '</span>');
      else                   out.push(esc(word));
      i = j; continue;
    }
    out.push(esc(c));
    i++;
  }
  return out.join('');
}

/* ═══════════════════════════
   STATE
═══════════════════════════ */
var files = [
  { id: 1, name: 'main.js', content:
    '// Welcome to the Code Editor\n' +
    '// Start writing your JavaScript code here\n\n' +
    'function greet(name) {\n' +
    '  const message = "Hello, " + name + "!";\n' +
    '  console.log(message);\n' +
    '  return message;\n' +
    '}\n\n' +
    'const result = greet("World");\n' +
    'console.log(result);\n\n' +
    '// Press the play button above to preview!\n'
  }
];
var activeId = 1;
var nextId   = 2;

/* per-file undo / redo stacks */
var undoSt = { 1: [] };
var redoSt = { 1: [] };

/* last committed value (for undo grouping) */
var lastCommit = files[0].content;

/* debounce timer for undo grouping */
var undoTimer = null;

function getFile() {
  for (var k = 0; k < files.length; k++) {
    if (files[k].id === activeId) return files[k];
  }
  return files[0];
}

/* ═══════════════════════════
   DOM REFS
═══════════════════════════ */
var tabsBar      = document.getElementById('tabsBar');
var lineNums     = document.getElementById('lineNums');
var hlLayer      = document.getElementById('hlLayer');
var codeArea     = document.getElementById('codeArea');
var undoBtn      = document.getElementById('undoBtn');
var redoBtn      = document.getElementById('redoBtn');
var selAllBtn    = document.getElementById('selAllBtn');
var copyTip      = document.getElementById('copyTip');
var copyBtn      = document.getElementById('copyBtn');
var tipDismiss   = document.getElementById('tipDismiss');
var menuBtn      = document.getElementById('menuBtn');
var dropdown     = document.getElementById('dropdown');
var saveBtn      = document.getElementById('saveBtn');
var deleteBtn    = document.getElementById('deleteBtn');
var renameBtn    = document.getElementById('renameBtn');
var renameRow    = document.getElementById('renameRow');
var renameInput  = document.getElementById('renameInput');
var renameOk     = document.getElementById('renameOk');
var addFileBtn   = document.getElementById('addFileBtn');
var playBtn      = document.getElementById('playBtn');
var previewOverlay = document.getElementById('previewOverlay');
var previewFrame = document.getElementById('previewFrame');
var closePreview = document.getElementById('closePreview');

/* ═══════════════════════════
   RENDER HELPERS
═══════════════════════════ */
function renderLineNums(text) {
  var n = (text.match(/\n/g) || []).length + 1;
  var h = '';
  for (var i = 1; i <= n; i++) h += '<div class="ln">' + i + '</div>';
  lineNums.innerHTML = h;
}

function renderHL(text) {
  hlLayer.innerHTML = highlight(text) + '\n';
}

function updateButtons() {
  undoBtn.disabled = !(undoSt[activeId] && undoSt[activeId].length > 0);
  redoBtn.disabled = !(redoSt[activeId] && redoSt[activeId].length > 0);
}

function renderTabs() {
  tabsBar.innerHTML = '';
  for (var i = 0; i < files.length; i++) {
    var f = files[i];
    var btn = document.createElement('button');
    btn.className = 'tab' + (f.id === activeId ? ' active' : '');
    btn.dataset.id = f.id;

    var nameEl = document.createElement('span');
    nameEl.textContent = f.name;
    btn.appendChild(nameEl);

    if (files.length > 1) {
      var xBtn = document.createElement('button');
      xBtn.className = 'tab-x';
      xBtn.title = 'Close';
      xBtn.innerHTML =
        '<svg width="10" height="10" viewBox="0 0 24 24" fill="none"' +
        ' stroke="currentColor" stroke-width="2.5">' +
        '<line x1="18" y1="6" x2="6" y2="18"/>' +
        '<line x1="6" y1="6" x2="18" y2="18"/>' +
        '</svg>';
      (function(fid) {
        xBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          closeTab(fid);
        });
      })(f.id);
      btn.appendChild(xBtn);
    }

    (function(fid) {
      btn.addEventListener('click', function() { switchTab(fid); });
    })(f.id);

    tabsBar.appendChild(btn);
  }
}

function renderEditor() {
  var f = getFile();
  codeArea.value = f.content;
  renderHL(f.content);
  renderLineNums(f.content);
  updateButtons();
  lastCommit = f.content;
}

/* ═══════════════════════════
   TAB ACTIONS
═══════════════════════════ */
function switchTab(id) {
  /* commit any pending undo snapshot */
  commitUndo();
  activeId = id;
  renderTabs();
  renderEditor();
  closeDropdown();
  copyTip.classList.remove('show');
}

function closeTab(id) {
  if (files.length === 1) return;
  files = files.filter(function(f){ return f.id !== id; });
  delete undoSt[id];
  delete redoSt[id];
  if (activeId === id) activeId = files[files.length - 1].id;
  renderTabs();
  renderEditor();
}

/* ═══════════════════════════
   UNDO / REDO
═══════════════════════════ */
function initStacks(id) {
  if (!undoSt[id]) undoSt[id] = [];
  if (!redoSt[id]) redoSt[id] = [];
}

function pushUndo(snapshot) {
  initStacks(activeId);
  var stack = undoSt[activeId];
  /* avoid duplicate consecutive snapshots */
  if (stack.length > 0 && stack[stack.length - 1] === snapshot) return;
  stack.push(snapshot);
  if (stack.length > 100) stack.shift();
  redoSt[activeId] = [];
}

/* Call before switching tabs to persist the current state */
function commitUndo() {
  clearTimeout(undoTimer);
  var cur = codeArea.value;
  if (cur !== lastCommit) {
    pushUndo(lastCommit);
    lastCommit = cur;
  }
}

function doUndo() {
  commitUndo();
  initStacks(activeId);
  var stack = undoSt[activeId];
  if (!stack.length) return;
  var prev = stack.pop();
  var cur  = getFile().content;
  redoSt[activeId].push(cur);
  applyContent(prev);
  lastCommit = prev;
}

function doRedo() {
  initStacks(activeId);
  var stack = redoSt[activeId];
  if (!stack.length) return;
  var next = stack.pop();
  var cur  = getFile().content;
  undoSt[activeId].push(cur);
  applyContent(next);
  lastCommit = next;
}

function applyContent(val) {
  for (var k = 0; k < files.length; k++) {
    if (files[k].id === activeId) { files[k].content = val; break; }
  }
  codeArea.value = val;
  renderHL(val);
  renderLineNums(val);
  updateButtons();
}

/* ═══════════════════════════
   TEXTAREA EVENTS
═══════════════════════════ */
codeArea.addEventListener('input', function () {
  var val = codeArea.value;

  /* update file content */
  for (var k = 0; k < files.length; k++) {
    if (files[k].id === activeId) { files[k].content = val; break; }
  }

  renderHL(val);
  renderLineNums(val);

  /* debounced undo: commit a snapshot 600ms after typing stops */
  clearTimeout(undoTimer);
  (function(snap) {
    undoTimer = setTimeout(function () {
      if (val !== lastCommit) {
        pushUndo(lastCommit);
        lastCommit = val;
        updateButtons();
      }
    }, 600);
  })(lastCommit);
});

codeArea.addEventListener('scroll', function () {
  hlLayer.scrollTop  = codeArea.scrollTop;
  hlLayer.scrollLeft = codeArea.scrollLeft;
  lineNums.scrollTop = codeArea.scrollTop;
});

codeArea.addEventListener('keydown', function (e) {
  /* Tab → 2 spaces */
  if (e.key === 'Tab') {
    e.preventDefault();
    var s = codeArea.selectionStart, en = codeArea.selectionEnd;
    var v = codeArea.value;
    var nv = v.slice(0, s) + '  ' + v.slice(en);
    commitUndo();
    codeArea.value = nv;
    codeArea.selectionStart = codeArea.selectionEnd = s + 2;
    for (var k = 0; k < files.length; k++) {
      if (files[k].id === activeId) { files[k].content = nv; break; }
    }
    renderHL(nv);
    renderLineNums(nv);
    lastCommit = nv;
    return;
  }
  /* Ctrl/Cmd + Z → Undo */
  if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key === 'z') {
    e.preventDefault(); doUndo(); return;
  }
  /* Ctrl/Cmd + Y  or  Ctrl+Shift+Z → Redo */
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) {
    e.preventDefault(); doRedo(); return;
  }
  /* Ctrl/Cmd + S → Save */
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault(); doSave(); return;
  }
  /* Ctrl/Cmd + A → Select All (show copy tip) */
  if ((e.ctrlKey || e.metaKey) && e.key === 'a') {
    setTimeout(function () { copyTip.classList.add('show'); }, 50);
  }
});

/* ═══════════════════════════
   TOOLBAR BUTTONS
═══════════════════════════ */
undoBtn.addEventListener('click', doUndo);
redoBtn.addEventListener('click', doRedo);

selAllBtn.addEventListener('click', function () {
  codeArea.focus();
  codeArea.select();
  copyTip.classList.add('show');
});

copyBtn.addEventListener('click', function () {
  var txt = codeArea.value;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).catch(function () { fallbackCopy(txt); });
  } else {
    fallbackCopy(txt);
  }
  copyTip.classList.remove('show');
});

function fallbackCopy(txt) {
  var ta = document.createElement('textarea');
  ta.value = txt;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch(e){}
  document.body.removeChild(ta);
}

tipDismiss.addEventListener('click', function () {
  copyTip.classList.remove('show');
});

/* Close copy tip on outside click */
document.addEventListener('mousedown', function (e) {
  if (!copyTip.contains(e.target) && e.target !== selAllBtn) {
    copyTip.classList.remove('show');
  }
});

/* Editor pill → focus editor */
document.getElementById('editorPill').addEventListener('click', function () {
  codeArea.focus();
});

/* ═══════════════════════════
   DROPDOWN
═══════════════════════════ */
function closeDropdown() {
  dropdown.classList.remove('show');
  renameRow.classList.remove('show');
  renameBtn.style.display = '';
}

menuBtn.addEventListener('click', function (e) {
  e.stopPropagation();
  var isOpen = dropdown.classList.toggle('show');
  if (!isOpen) { renameRow.classList.remove('show'); renameBtn.style.display = ''; }
});

document.addEventListener('mousedown', function (e) {
  if (!dropdown.contains(e.target) && e.target !== menuBtn) {
    closeDropdown();
  }
});

/* Save */
function doSave() {
  var f = getFile();
  var blob = new Blob([f.content], { type: 'text/plain' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url; a.download = f.name; a.click();
  URL.revokeObjectURL(url);
  closeDropdown();
}
saveBtn.addEventListener('click', doSave);

/* Delete */
deleteBtn.addEventListener('click', function () {
  commitUndo();
  pushUndo(getFile().content);
  applyContent('');
  lastCommit = '';
  closeDropdown();
});

/* Rename */
renameBtn.addEventListener('click', function (e) {
  e.stopPropagation();
  renameInput.value = getFile().name;
  renameRow.classList.add('show');
  renameBtn.style.display = 'none';
  setTimeout(function () { renameInput.focus(); renameInput.select(); }, 80);
});

function doRename() {
  var v = renameInput.value.trim();
  if (v) {
    for (var k = 0; k < files.length; k++) {
      if (files[k].id === activeId) { files[k].name = v; break; }
    }
    renderTabs();
  }
  renameRow.classList.remove('show');
  renameBtn.style.display = '';
  closeDropdown();
}

renameOk.addEventListener('click', doRename);
renameInput.addEventListener('keydown', function (e) {
  if (e.key === 'Enter')  { doRename(); }
  if (e.key === 'Escape') { renameRow.classList.remove('show'); renameBtn.style.display = ''; }
});

/* Add File */
addFileBtn.addEventListener('click', function () {
  var id   = nextId++;
  var name = 'file' + id + '.js';
  files.push({ id: id, name: name, content: '// New file\n' });
  undoSt[id] = []; redoSt[id] = [];
  commitUndo();
  activeId = id;
  renderTabs();
  renderEditor();
  lastCommit = '// New file\n';
  closeDropdown();
  codeArea.focus();
});

/* ═══════════════════════════
   PREVIEW
═══════════════════════════ */
function buildPreviewHTML(code) {
  /* use JSON.stringify so any user code (backticks, slashes, etc.) is safe */
  var safeCode = JSON.stringify(code);

  return '<!DOCTYPE html>\n' +
  '<html>\n<head>\n' +
  '<meta charset="utf-8">\n' +
  '<meta name="viewport" content="width=device-width,initial-scale=1">\n' +
  '<style>\n' +
  '*{box-sizing:border-box;margin:0;padding:0;}\n' +
  'body{background:#000;color:#e4e4e4;' +
       'font-family:\'Cascadia Code\',\'Fira Code\',monospace;' +
       'font-size:13px;line-height:1.65;padding:20px;min-height:100vh;}\n' +
  '.hdr{color:#333;font-size:10px;text-transform:uppercase;' +
       'letter-spacing:.1em;margin-bottom:14px;' +
       'border-bottom:1px solid #1a1a1a;padding-bottom:8px;}\n' +
  '.row{margin:2px 0;word-break:break-word;white-space:pre-wrap;}\n' +
  '.log{color:#e4e4e4;} .err{color:#ff5370;} .warn{color:#ffcb6b;} .info{color:#89ddff;}\n' +
  '</style>\n</head>\n<body>\n' +
  '<div class="hdr">Console Output</div>\n' +
  '<div id="out"></div>\n' +
  '<script>\n' +
  '(function(){\n' +
  'var out=document.getElementById(\'out\');\n' +
  'function line(a,cls){\n' +
  '  var d=document.createElement(\'div\');\n' +
  '  d.className=\'row \'+cls;\n' +
  '  d.textContent=a.map(function(x){\n' +
  '    if(x===null)return\'null\';\n' +
  '    if(x===undefined)return\'undefined\';\n' +
  '    if(typeof x===\'object\'){try{return JSON.stringify(x,null,2);}catch(e){return String(x);}}\n' +
  '    return String(x);\n' +
  '  }).join(\' \');\n' +
  '  out.appendChild(d);\n' +
  '}\n' +
  'var _l=console.log,_e=console.error,_w=console.warn,_i=console.info;\n' +
  'console.log=function(){var a=[].slice.call(arguments);line(a,\'log\');_l.apply(console,a);};\n' +
  'console.error=function(){var a=[].slice.call(arguments);line(a,\'err\');_e.apply(console,a);};\n' +
  'console.warn=function(){var a=[].slice.call(arguments);line(a,\'warn\');_w.apply(console,a);};\n' +
  'console.info=function(){var a=[].slice.call(arguments);line(a,\'info\');_i.apply(console,a);};\n' +
  'window.onerror=function(m,s,l,c,err){\n' +
  '  line([\'\u26a0 \'+(err?err.toString():m)+\' (line \'+l+\')\'],\'err\');\n' +
  '  return true;\n' +
  '};\n' +
  'try{\n' +
  '  var __code=' + safeCode + ';\n' +
  '  (new Function(__code))();\n' +
  '}catch(e){\n' +
  '  line([\'\u26a0 \'+e.toString()],\'err\');\n' +
  '}\n' +
  '})();\n' +
  '<\/script>\n' +
  '</body>\n</html>';
}

function openPreview() {
  var html = buildPreviewHTML(getFile().content);
  var doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
  doc.open();
  doc.write(html);
  doc.close();
  previewOverlay.classList.add('show');
}

function closePreviewFn() {
  previewOverlay.classList.remove('show');
  /* clear iframe */
  var doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
  doc.open(); doc.write(''); doc.close();
}

playBtn.addEventListener('click', openPreview);
closePreview.addEventListener('click', closePreviewFn);
previewOverlay.addEventListener('click', function (e) {
  if (e.target === previewOverlay) closePreviewFn();
});
document.addEventListener('keydown', function (e) {
  if (e.key === 'Escape') {
    if (previewOverlay.classList.contains('show')) closePreviewFn();
    else closeDropdown();
  }
});

/* ═══════════════════════════
   INIT
═══════════════════════════ */
renderTabs();
renderEditor();

})();
</script>
