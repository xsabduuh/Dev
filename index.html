<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Code Editor – Preview Fix & Scroll Top</title>
<style>
/* ══════════════════════════════════════
   ALL STYLES – COMPLETE
══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
:root{
  --bg:#000;--bg-s:#0a0a0a;--bg-card:#111;--bg-hover:#1a1a1a;--bg-menu:#141414;
  --border:#222;--bhi:#2e2e2e;
  --fg:#e4e4e4;--fg2:#777;--fg3:#3a3a3a;
  --acc:#c792ea;--green:#c3e88d;--blue:#82aaff;--org:#f78c6c;--yel:#ffcb6b;--red:#ff5370;
  --hh:50px;--th:36px;--tbh:70px;
  --mono:'Cascadia Code','Fira Code','JetBrains Mono','Courier New',monospace;
}
html{height:100%;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
body{height:100%;width:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--fg);-webkit-font-smoothing:antialiased;}
button{cursor:pointer;font-family:inherit;-webkit-user-select:none;user-select:none;}

/* Shell */
.shell{display:flex;flex-direction:column;height:100dvh;width:100vw;overflow:hidden;position:fixed;inset:0;background:var(--bg);}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;height:var(--hh);background:var(--bg-s);border-bottom:1px solid var(--border);padding:0 16px;flex-shrink:0;position:relative;z-index:10;}
.h-side{width:44px;display:flex;align-items:center;}
.h-side.r{justify-content:flex-end;}
.h-title{font-size:14px;font-weight:600;letter-spacing:.07em;color:var(--fg);position:absolute;left:50%;transform:translateX(-50%);}
.play-btn{width:38px;height:38px;border-radius:50%;background:var(--acc);border:none;display:flex;align-items:center;justify-content:center;transition:background .15s,transform .1s;flex-shrink:0;}
.play-btn:hover{background:#d9a8ff;}.play-btn:active{transform:scale(.92);}
.play-btn svg{margin-left:2px;display:block;}

/* Tabs */
.tabs-bar{display:flex;align-items:stretch;height:var(--th);background:var(--bg-s);border-bottom:1px solid var(--border);overflow-x:auto;overflow-y:hidden;flex-shrink:0;scrollbar-width:none;touch-action:pan-x;}
.tabs-bar::-webkit-scrollbar{display:none;}
.tab{display:inline-flex;align-items:center;gap:7px;padding:0 14px;height:100%;background:transparent;border:none;border-right:1px solid var(--border);color:var(--fg2);font-family:var(--mono);font-size:12px;white-space:nowrap;flex-shrink:0;cursor:pointer;transition:color .12s,background .12s;position:relative;}
.tab:hover{color:var(--fg);background:var(--bg-hover);}
.tab.active{color:var(--fg);background:var(--bg);}
.tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--acc);}
.tab-x{display:flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:4px;background:transparent;border:none;color:var(--fg3);padding:0;cursor:pointer;transition:color .12s,background .12s;flex-shrink:0;}
.tab-x:hover{color:var(--red);background:rgba(255,83,112,.14);}

/* Editor */
.editor-wrap{flex:1;display:flex;overflow:hidden;min-height:0;background:var(--bg);}
.line-nums{width:50px;flex-shrink:0;background:var(--bg-s);border-right:1px solid var(--border);padding:14px 0;overflow:hidden;user-select:none;-webkit-user-select:none;text-align:right;}
.ln{font-family:var(--mono);font-size:14px;line-height:1.57;color:var(--fg3);padding-right:10px;}
.editor-inner{flex:1;position:relative;overflow:hidden;}
.hl-layer,.code-area{
  position:absolute;inset:0;
  padding:14px;
  font-family:var(--mono);
  font-size:14px;
  line-height:1.57;
  white-space:pre;
  overflow:auto;
  tab-size:2;-moz-tab-size:2;
  word-spacing:normal;letter-spacing:normal;
}
.hl-layer{color:var(--fg);pointer-events:none;z-index:1;overflow:hidden;}
.code-area{
  z-index:2;background:transparent;color:transparent;
  caret-color:var(--acc);border:none;outline:none;resize:none;
  width:100%;height:100%;
  -webkit-text-fill-color:transparent;
  -webkit-user-select:text;user-select:text;
  touch-action:pan-x pan-y;
}
.code-area::selection{background:rgba(199,146,234,.22);}

/* Syntax */
.kw{color:var(--acc);font-style:italic;}
.str{color:var(--green);}
.cmt{color:#3d3d3d;font-style:italic;}
.num{color:var(--org);}
.fn{color:var(--blue);}
.cls{color:var(--yel);}

/* Toolbar */
.toolbar{height:var(--tbh);background:var(--bg-s);border-top:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;z-index:10;padding-bottom:10px;}
.tb-inner{display:flex;align-items:center;justify-content:center;width:100%;max-width:520px;padding:0 16px;}
.ic-btn{width:38px;height:38px;border-radius:50%;background:var(--bg-card);border:1px solid var(--bhi);color:var(--fg2);display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s,transform .1s,border-color .12s;flex-shrink:0;}
.ic-btn:hover:not(:disabled){background:var(--bg-hover);color:var(--fg);border-color:#444;}
.ic-btn:active:not(:disabled){transform:scale(.9);}
.ic-btn:disabled{opacity:.25;cursor:not-allowed;}

/* Copy tooltip */
.sel-wrap{position:relative;}
.copy-tip{position:absolute;bottom:calc(100% + 12px);left:50%;transform:translateX(-50%);background:var(--bg-menu);border:1px solid var(--bhi);border-radius:8px;padding:6px 10px;display:none;align-items:center;gap:6px;white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,.8);z-index:600;}
.copy-tip.show{display:flex;}
.copy-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--bhi);}
.copy-btn2{display:flex;align-items:center;gap:5px;background:none;border:none;color:var(--fg);font-size:12px;font-weight:500;padding:0;cursor:pointer;transition:color .12s;}
.copy-btn2:hover{color:var(--acc);}
.tip-dismiss{display:flex;align-items:center;background:none;border:none;color:var(--fg2);padding:0;cursor:pointer;}
.tip-dismiss:hover{color:var(--fg);}

/* Dropdown */
.menu-wrap{position:relative;}
.dropdown{position:absolute;bottom:calc(100% + 12px);right:0;background:var(--bg-menu);border:1px solid var(--bhi);border-radius:10px;overflow:hidden;min-width:188px;box-shadow:0 12px 36px rgba(0,0,0,.9);z-index:600;display:none;}
.dropdown.show{display:block;}
.dd-item{display:flex;align-items:center;gap:9px;width:100%;padding:10px 14px;background:none;border:none;color:var(--fg2);font-size:13px;text-align:left;cursor:pointer;transition:background .12s,color .12s;}
.dd-item:hover{background:var(--bg-hover);color:var(--fg);}
.dd-item.danger:hover{background:rgba(255,83,112,.1);color:var(--red);}
.dd-sep{height:1px;background:var(--border);margin:3px 0;}
.rename-row{display:none;align-items:center;gap:6px;padding:7px 10px;}
.rename-row.show{display:flex;}
.rename-input{flex:1;min-width:0;background:var(--bg-s);border:1px solid var(--bhi);border-radius:6px;color:var(--fg);font-family:var(--mono);font-size:16px;padding:5px 8px;outline:none;transition:border-color .12s;}
.rename-input:focus{border-color:var(--acc);}
.rename-ok{width:28px;height:28px;border-radius:6px;background:var(--acc);border:none;color:#000;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:background .12s;}
.rename-ok:hover{background:#d9a8ff;}

/* Saved Files Panel */
.saves-panel{position:fixed;inset:0;z-index:900;display:none;flex-direction:column;background:var(--bg);}
.saves-panel.show{display:flex;}
.saves-hd{display:flex;align-items:center;justify-content:space-between;height:50px;padding:0 16px;background:var(--bg-s);border-bottom:1px solid var(--border);flex-shrink:0;}
.saves-title{font-size:14px;font-weight:600;color:var(--fg);letter-spacing:.05em;}
.saves-close{width:32px;height:32px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--fg2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .12s,color .12s;}
.saves-close:hover{background:rgba(255,83,112,.12);color:var(--red);}
.saves-list{flex:1;overflow-y:auto;padding:12px;}
.save-empty{text-align:center;padding:48px 20px;color:var(--fg3);font-size:14px;line-height:1.7;}
.save-card{background:var(--bg-s);border:1px solid var(--border);border-radius:10px;padding:13px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;transition:border-color .15s;}
.save-card:hover{border-color:var(--bhi);}
.save-icon{width:36px;height:36px;border-radius:8px;background:rgba(199,146,234,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.save-info{flex:1;min-width:0;}
.save-name{font-family:var(--mono);font-size:13px;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.save-date{font-size:11px;color:var(--fg2);}
.save-actions{display:flex;gap:6px;flex-shrink:0;}
.save-load{padding:5px 12px;border-radius:6px;background:var(--acc);border:none;color:#000;font-size:12px;font-weight:600;cursor:pointer;transition:background .12s;}
.save-load:hover{background:#d9a8ff;}
.save-del{width:28px;height:28px;border-radius:6px;background:transparent;border:1px solid var(--border);color:var(--fg2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .12s,color .12s;}
.save-del:hover{background:rgba(255,83,112,.1);color:var(--red);border-color:rgba(255,83,112,.3);}

/* Preview – Full Screen Overlay */
.preview-overlay{position:fixed;inset:0;background:#000;z-index:800;display:none;align-items:center;justify-content:center;}
/* الإصلاح: عدم استخدام flex كي لا ينكمش الـ iframe */
.preview-overlay.show{display:block;}
.preview-frame{border:none;width:100%;height:100%;background:#000;}
.preview-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(20,20,20,.9);border:1px solid var(--bhi);color:var(--fg2);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:810;transition:background .12s,color .12s,border-color .12s;}
.preview-close:hover{background:rgba(255,83,112,.2);color:var(--red);border-color:rgba(255,83,112,.4);}

/* Toast */
.toast{position:fixed;bottom:calc(var(--tbh) + 16px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg-menu);border:1px solid var(--bhi);border-radius:8px;padding:8px 16px;font-size:13px;color:var(--fg);white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,.8);z-index:700;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Scrollbars */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:#3a3a3a;}

@media(max-width:480px){
  .tb-inner{padding:0 10px;}
}
</style>
</head>
<body>
<div class="shell">
  <header class="header">
    <div class="h-side l"></div>
    <span class="h-title">Editor</span>
    <div class="h-side r">
      <button class="play-btn" id="playBtn" title="Preview">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
      </button>
    </div>
  </header>

  <div class="tabs-bar" id="tabsBar"></div>

  <div class="editor-wrap">
    <div class="line-nums" id="lineNums"></div>
    <div class="editor-inner">
      <div class="hl-layer" id="hlLayer" aria-hidden="true"></div>
      <textarea class="code-area" id="codeArea" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
    </div>
  </div>

  <footer class="toolbar">
    <div class="tb-inner">
      <div style="display:flex; align-items:center; gap:10px;">
        <button class="ic-btn" id="undoBtn" title="Undo" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>
          </svg>
        </button>

        <div class="sel-wrap">
          <button class="ic-btn" id="selAllBtn" title="Select All">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
            </svg>
          </button>
          <div class="copy-tip" id="copyTip">
            <button class="copy-btn2" id="copyBtn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>Copy
            </button>
            <button class="tip-dismiss" id="tipDismiss">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
        </div>

        <button class="ic-btn" id="redoBtn" title="Redo" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/>
          </svg>
        </button>

        <div class="menu-wrap">
          <button class="ic-btn" id="menuBtn" title="Options">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/>
            </svg>
          </button>
          <div class="dropdown" id="dropdown">
            <button class="dd-item" id="saveBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
              </svg>Save Project
            </button>
            <button class="dd-item danger" id="deleteBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                <path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
              </svg>Delete Code
            </button>
            <button class="dd-item" id="renameBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
              </svg>Rename
            </button>
            <div class="rename-row" id="renameRow">
              <input class="rename-input" id="renameInput" type="text" placeholder="filename.js"/>
              <button class="rename-ok" id="renameOk">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
              </button>
            </div>
            <div class="dd-sep"></div>
            <button class="dd-item" id="addFileBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
              </svg>Add New File
            </button>
            <div class="dd-sep"></div>
            <button class="dd-item" id="openSavesBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
              </svg>Saved Files
            </button>
          </div>
        </div>
      </div>
    </div>
  </footer>
</div>

<!-- Saved Files Panel -->
<div class="saves-panel" id="savesPanel">
  <div class="saves-hd">
    <span class="saves-title">Saved Files</span>
    <button class="saves-close" id="savesClose">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>

  <div class="saves-list" id="savesList"></div>

<!-- Preview Overlay -->
<div class="preview-overlay" id="previewOverlay">

    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>

  <iframe class="preview-frame" id="previewFrame" title="Code Preview" sandbox="allow-scripts allow-same-origin"></iframe>

<script>
/* =========================================================
   ⚠️ تنبيه هام للمطورين والذكاء الاصطناعي ⚠️
   (نظام الترقية - كما هو)
   ========================================================= */
(function(){
'use strict';

/* ═══════════ MIGRATION ═══════════ */
var DATA_VERSION = 2;
function migrateData() {
  var versionKey = 'ce_saves_version', dataKey = 'ce_saves_v1';
  var storedVersion = localStorage.getItem(versionKey);
  var currentVersion = parseInt(storedVersion, 10) || 0;
  if (currentVersion < 2 && localStorage.getItem(dataKey)) {
    try {
      var oldData = JSON.parse(localStorage.getItem(dataKey) || '[]');
      var newData = oldData.map(function(item) {
        if (!item.type) { item.type = item.files ? 'project' : 'file'; }
        return item;
      });
      localStorage.setItem(dataKey, JSON.stringify(newData));
    } catch(e) {}
    currentVersion = 2;
  }
  localStorage.setItem(versionKey, currentVersion);
}
migrateData();

/* ═══════════ HIGHLIGHTER ═══════════ */
var KW=new Set(['const','let','var','function','return','if','else','for','while','do',
  'switch','case','break','continue','new','delete','typeof','instanceof','in','of',
  'class','extends','import','export','default','async','await','try','catch','finally',
  'throw','this','super','null','undefined','true','false','void','yield','static',
  'get','set','from','debugger','with']);

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function highlight(code){
  var out=[],i=0,len=code.length,c,j,word;
  while(i<len){
    c=code[i];
    if(c==='/'&&code[i+1]==='/'){j=code.indexOf('\n',i);if(j===-1)j=len;out.push('<span class="cmt">'+esc(code.slice(i,j))+'</span>');i=j;continue;}
    if(c==='/'&&code[i+1]==='*'){j=code.indexOf('*/',i+2);j=j===-1?len:j+2;out.push('<span class="cmt">'+esc(code.slice(i,j))+'</span>');i=j;continue;}
    if(c==='"'||c==="'"||c==='`'){j=i+1;while(j<len){if(code[j]==='\\'){j+=2;continue;}if(code[j]===c){j++;break;}j++;}out.push('<span class="str">'+esc(code.slice(i,j))+'</span>');i=j;continue;}
    if(/\d/.test(c)&&(i===0||/\W/.test(code[i-1]))){j=i;if(code[j]==='0'&&(code[j+1]==='x'||code[j+1]==='X')){j+=2;while(j<len&&/[0-9a-fA-F]/.test(code[j]))j++;}else{while(j<len&&/[\d.eE]/.test(code[j]))j++;}out.push('<span class="num">'+esc(code.slice(i,j))+'</span>');i=j;continue;}
    if(/[a-zA-Z_$]/.test(c)){j=i+1;while(j<len&&/[\w$]/.test(code[j]))j++;word=code.slice(i,j);if(KW.has(word))out.push('<span class="kw">'+esc(word)+'</span>');else if(code[j]==='(')out.push('<span class="fn">'+esc(word)+'</span>');else if(/^[A-Z]/.test(word))out.push('<span class="cls">'+esc(word)+'</span>');else out.push(esc(word));i=j;continue;}
    out.push(esc(c));i++;
  }
  return out.join('');
}

/* ═══════════ STATE ═══════════ */
var files=[{id:1,name:'index.html',content:''}];
var activeId=1,nextId=2;
var undoSt={1:[]},redoSt={1:[]};
var lastCommit='';
var undoTimer=null;
var editingTabId = null;

function getFile(){for(var k=0;k<files.length;k++)if(files[k].id===activeId)return files[k];return files[0];}
function findFileByName(name){for(var i=0;i<files.length;i++){if(files[i].name===name)return files[i];}return null;}

/* ═══════════ DOM ═══════════ */
var tabsBar=document.getElementById('tabsBar');
var lineNums=document.getElementById('lineNums');
var hlLayer=document.getElementById('hlLayer');
var codeArea=document.getElementById('codeArea');
var undoBtn=document.getElementById('undoBtn');
var redoBtn=document.getElementById('redoBtn');
var selAllBtn=document.getElementById('selAllBtn');
var copyTip=document.getElementById('copyTip');
var copyBtn=document.getElementById('copyBtn');
var tipDismiss=document.getElementById('tipDismiss');
var menuBtn=document.getElementById('menuBtn');
var dropdown=document.getElementById('dropdown');
var saveBtn=document.getElementById('saveBtn');
var deleteBtn=document.getElementById('deleteBtn');
var renameBtn=document.getElementById('renameBtn');
var renameRow=document.getElementById('renameRow');
var renameInput=document.getElementById('renameInput');
var renameOk=document.getElementById('renameOk');
var addFileBtn=document.getElementById('addFileBtn');
var openSavesBtn=document.getElementById('openSavesBtn');
var savesPanel=document.getElementById('savesPanel');
var savesClose=document.getElementById('savesClose');
var savesList=document.getElementById('savesList');
var playBtn=document.getElementById('playBtn');
var previewOverlay=document.getElementById('previewOverlay');
var previewFrame=document.getElementById('previewFrame');
var closePreview=document.getElementById('closePreview');
var toastEl=document.getElementById('toast');

/* ═══════════ TOAST ═══════════ */
var toastTimer=null;
function showToast(msg){
  toastEl.textContent=msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){toastEl.classList.remove('show');},2200);
}

/* ═══════════ RENDER ═══════════ */
function renderLineNums(text){
  var n = (text.match(/\n/g)||[]).length + 1;
  var h='';
  for(var i=1;i<=n;i++) h+='<div class="ln">'+i+'</div>';
  lineNums.innerHTML=h;
}
function renderHL(text){hlLayer.innerHTML=highlight(text)+'\n';}
function updateBtns(){
  undoBtn.disabled=!(undoSt[activeId]&&undoSt[activeId].length>0);
  redoBtn.disabled=!(redoSt[activeId]&&redoSt[activeId].length>0);
}

function renderTabs(){
  tabsBar.innerHTML='';
  for(var i=0;i<files.length;i++){
    (function(f){
      var btn=document.createElement('button');
      btn.className='tab'+(f.id===activeId?' active':'');

      if(f.id === editingTabId){
        var input = document.createElement('input');
        input.type = 'text';
        input.value = f.name;
        input.style.cssText = 'background:transparent; border:none; outline:none; color:inherit; font:inherit; width:100%; padding:0; margin:0;';
        input.addEventListener('keydown', function(e){
          e.stopPropagation();
          if(e.key === 'Enter') finishRename(input.value.trim(), f.id);
          if(e.key === 'Escape') cancelRename();
        });
        input.addEventListener('blur', function(){
          finishRename(input.value.trim(), f.id);
        });
        btn.appendChild(input);
        setTimeout(function(){ input.focus(); input.select(); }, 20);
      } else {
        var sp=document.createElement('span');sp.textContent=f.name;btn.appendChild(sp);
      }

      if(files.length>1){
        var x=document.createElement('button');x.className='tab-x';x.title='Close';
        x.innerHTML='<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
        x.addEventListener('click',function(e){e.stopPropagation();closeTab(f.id);});
        btn.appendChild(x);
      }

      // Long press detection with flag (no preventDefault on touchstart)
      var pressStartTime = 0;
      var longPressed = false;

      function onTouchStart(e) {
        if (editingTabId !== null) return;
        pressStartTime = Date.now();
        longPressed = false;
      }

      function onTouchEnd(e) {
        if (!pressStartTime) return;
        var elapsed = Date.now() - pressStartTime;
        if (elapsed >= 500) {
          longPressed = true;
          if (f.id === activeId) {
            startEditTabName(f.id);
          }
          e.preventDefault();
        } else {
          longPressed = false;
        }
        pressStartTime = 0;
      }

      function onTouchCancel(e) {
        pressStartTime = 0;
        longPressed = false;
      }

      btn.addEventListener('mousedown', function(e) {
        if (editingTabId !== null) return;
        pressStartTime = Date.now();
        longPressed = false;
      });
      btn.addEventListener('mouseup', function(e) {
        if (!pressStartTime) return;
        var elapsed = Date.now() - pressStartTime;
        if (elapsed >= 500) {
          longPressed = true;
          if (f.id === activeId) {
            startEditTabName(f.id);
          }
        } else {
          longPressed = false;
        }
        pressStartTime = 0;
      });
      btn.addEventListener('mouseleave', function() { pressStartTime = 0; });

      btn.addEventListener('touchstart', onTouchStart, {passive: true});
      btn.addEventListener('touchend', onTouchEnd, {passive: false});
      btn.addEventListener('touchcancel', onTouchCancel, {passive: true});

      btn.addEventListener('click', function(e) {
        if (editingTabId !== null) return;
        if (longPressed) {
          longPressed = false;
          return;
        }
        if (e.target.closest('.tab-x')) return;
        if (f.id !== activeId) {
          switchTab(f.id);
        }
      });

      tabsBar.appendChild(btn);
    })(files[i]);
  }
}

/* ═══════════ TABS ═══════════ */
function switchTab(id){
  commitUndo();
  activeId=id;
  editingTabId = null;
  renderTabs();
  renderEditor();
  closeDropdown();
  copyTip.classList.remove('show');
}

function closeTab(id){
  if(files.length===1)return;
  if(editingTabId === id) editingTabId = null;
  files=files.filter(function(f){return f.id!==id;});
  delete undoSt[id];delete redoSt[id];
  if(activeId===id)activeId=files[files.length-1].id;
  renderTabs();renderEditor();
}

/* ═══════════ INLINE RENAME ═══════════ */
function startEditTabName(id){
  editingTabId = id;
  renderTabs();
}
function finishRename(newName, id){
  if(editingTabId !== id) return;
  newName = (newName || '').trim();
  if(newName){
    for(var k=0;k<files.length;k++){
      if(files[k].id === id){ files[k].name = newName; break; }
    }
  }
  editingTabId = null;
  renderTabs();
}
function cancelRename(){
  editingTabId = null;
  renderTabs();
}

/* ═══════════ SMART PASTE RENAME ═══════════ */
function detectLanguage(content) {
  if (/^\s*<!DOCTYPE html>/i.test(content) || /<html[\s>]/i.test(content) || /<head[\s>]/i.test(content) || /<body[\s>]/i.test(content)) {
    return 'html';
  }
  if (/[.#]?[\w-]+(\s*,\s*[.#]?[\w-]+)*\s*\{[^}]*:[^}]*\}/.test(content) && !/<[a-z]+/i.test(content)) {
    return 'css';
  }
  if (/\b(function|const|let|var|=>|import|export|class\s+\w+)\b/.test(content) && !/<[a-z]+/i.test(content)) {
    return 'javascript';
  }
  return null;
}

function autoRenameAfterPaste() {
  var f = getFile();
  var content = f.content;
  if (!content.trim()) return;
  var lang = detectLanguage(content);
  if (!lang) return;

  var ext = (lang === 'html') ? '.html' : (lang === 'css' ? '.css' : '.js');
  var currentName = f.name;
  var currentLower = currentName.toLowerCase();
  if (currentLower.endsWith(ext)) return;

  var baseName = 'untitled' + ext;
  var counter = 1;
  var newName = baseName;
  while (files.some(function(file){ return file.name.toLowerCase() === newName.toLowerCase(); })) {
    newName = 'untitled' + counter + ext;
    counter++;
  }
  f.name = newName;
  renderTabs();
  showToast('Renamed to ' + newName + ' (auto-detected)');
}

codeArea.addEventListener('paste', function() {
  setTimeout(function() {
    // إصلاح: إعادة التمرير إلى الأعلى بعد اللصق
    codeArea.scrollTop = 0;
    // مزامنة الطبقات الأخرى
    hlLayer.scrollTop = 0;
    lineNums.scrollTop = 0;
    autoRenameAfterPaste();
  }, 10);
});

/* ═══════════ UNDO / REDO ═══════════ */
function initSt(id){if(!undoSt[id])undoSt[id]=[];if(!redoSt[id])redoSt[id]=[];}
function pushUndo(snap){
  initSt(activeId);
  var st=undoSt[activeId];
  if(st.length&&st[st.length-1]===snap)return;
  st.push(snap);if(st.length>100)st.shift();
  redoSt[activeId]=[];
}
function commitUndo(){
  clearTimeout(undoTimer);
  var cur=codeArea.value;
  if(cur !== lastCommit){
    pushUndo(lastCommit);
    lastCommit = cur;
  }
}
function applyContent(val){
  for(var k=0;k<files.length;k++)if(files[k].id===activeId){files[k].content=val;break;}
  codeArea.value = val;
  renderHL(val);
  renderLineNums(val);
  updateBtns();
}
function doUndo(){
  commitUndo();initSt(activeId);
  var st=undoSt[activeId];if(!st.length)return;
  var prev=st.pop();redoSt[activeId].push(getFile().content);
  applyContent(prev);lastCommit=prev;
}
function doRedo(){
  initSt(activeId);
  var st=redoSt[activeId];if(!st.length)return;
  var next=st.pop();undoSt[activeId].push(getFile().content);
  applyContent(next);lastCommit=next;
}

/* ═══════════ TEXTAREA EVENTS ═══════════ */
codeArea.addEventListener('input',function(){
  var val=codeArea.value;
  for(var k=0;k<files.length;k++)if(files[k].id===activeId){files[k].content=val;break;}
  renderHL(val);renderLineNums(val);
  clearTimeout(undoTimer);
  var snap=lastCommit;
  undoTimer=setTimeout(function(){
    if(val!==snap){pushUndo(snap);lastCommit=val;updateBtns();}
  },600);
});
codeArea.addEventListener('scroll',function(){
  hlLayer.scrollTop=codeArea.scrollTop;
  hlLayer.scrollLeft=codeArea.scrollLeft;
  lineNums.scrollTop=codeArea.scrollTop;
});
codeArea.addEventListener('keydown',function(e){
  if(e.key==='Tab'){
    e.preventDefault();
    var s=codeArea.selectionStart,en=codeArea.selectionEnd,v=codeArea.value;
    var nv=v.slice(0,s)+'  '+v.slice(en);
    commitUndo();codeArea.value=nv;codeArea.selectionStart=codeArea.selectionEnd=s+2;
    for(var k=0;k<files.length;k++)if(files[k].id===activeId){files[k].content=nv;break;}
    renderHL(nv);renderLineNums(nv);lastCommit=nv;return;
  }
  if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&e.key==='z'){e.preventDefault();doUndo();return;}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='z'))){e.preventDefault();doRedo();return;}
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();doSave();return;}
  if((e.ctrlKey||e.metaKey)&&e.key==='a'){setTimeout(function(){copyTip.classList.add('show');},50);}
});

/* ═══════════ TOOLBAR BUTTONS ═══════════ */
undoBtn.addEventListener('click',doUndo);
redoBtn.addEventListener('click',doRedo);
selAllBtn.addEventListener('click',function(){codeArea.focus();codeArea.select();copyTip.classList.add('show');});
copyBtn.addEventListener('click',function(){
  var txt=codeArea.value;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).catch(function(){fbCopy(txt);});
  }else fbCopy(txt);
  copyTip.classList.remove('show');
  showToast('Copied!');
});
function fbCopy(t){var ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;top:-9999px;left:-9999px;opacity:0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);}
tipDismiss.addEventListener('click',function(){copyTip.classList.remove('show');});
document.addEventListener('mousedown',function(e){if(!copyTip.contains(e.target)&&e.target!==selAllBtn)copyTip.classList.remove('show');});

/* ═══════════ DROPDOWN ═══════════ */
function closeDropdown(){
  dropdown.classList.remove('show');
  renameRow.classList.remove('show');
  renameBtn.style.display='';
}

menuBtn.addEventListener('click', function(e) {
  e.stopPropagation();
  dropdown.classList.toggle('show');
  if (!dropdown.classList.contains('show')) {
    renameRow.classList.remove('show');
    renameBtn.style.display='';
  }
});

function handleOutsideClick(e) {
  if (!dropdown.classList.contains('show')) return;
  if (e.target === menuBtn || menuBtn.contains(e.target)) return;
  if (dropdown.contains(e.target)) return;
  closeDropdown();
}

document.addEventListener('click', handleOutsideClick);
document.addEventListener('touchend', function(e) {
  setTimeout(function() { handleOutsideClick(e); }, 10);
});

/* ═══════════ PROJECT SAVE ═══════════ */
var LS_KEY='ce_saves_v1';
function getSaves(){ try{return JSON.parse(localStorage.getItem(LS_KEY)||'[]');}catch(e){return[];} }
function setSaves(arr){ try{localStorage.setItem(LS_KEY,JSON.stringify(arr));}catch(e){showToast('Storage full!');} }

function doSave(){
  var projectName = prompt('Enter a name for your project:', 'MyProject');
  if (!projectName || !projectName.trim()) { showToast('Save cancelled'); closeDropdown(); return; }
  projectName = projectName.trim();
  var arr = getSaves();
  var now = new Date();
  var label = now.toLocaleDateString('en',{month:'short',day:'numeric'})+' '+now.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});
  var projectFiles = files.map(function(f){ return { id:f.id, name:f.name, content:f.content }; });
  var projectEntry = { id:'proj_'+Date.now(), type:'project', name:projectName, files:projectFiles, date:label };
  arr.unshift(projectEntry);
  if(arr.length > 50) arr = arr.slice(0, 50);
  setSaves(arr);
  showToast('Project saved: ' + projectName);
  closeDropdown();
}
saveBtn.addEventListener('click', doSave);

/* ═══════════ SAVED FILES PANEL ═══════════ */
function renderSavesList() {
  var arr = getSaves();
  if(!arr.length) { savesList.innerHTML = '<div class="save-empty">No saved files or projects.<br>Use <strong>Save Project</strong> to save all tabs.</div>'; return; }
  var html = '';
  arr.forEach(function(s) {
    var isProject = (s.type === 'project');
    var iconSvg = isProject
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#82aaff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><polyline points="17 8 12 13 8 10"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#c792ea" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
    var nameDisplay = esc(s.name);
    if (isProject) nameDisplay += ' <span style="color:#82aaff;font-size:11px;">[Project]</span>';
    html += '<div class="save-card" data-id="'+s.id+'">'
      +'<div class="save-icon">'+iconSvg+'</div>'
      +'<div class="save-info"><div class="save-name">'+nameDisplay+'</div><div class="save-date">'+esc(s.date)+'</div></div>'
      +'<div class="save-actions">'
      +'<button class="save-load" data-load="'+s.id+'">Load</button>'
      +'<button class="save-del" data-del="'+s.id+'" title="Delete"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>'
      +'</div></div>';
  });
  savesList.innerHTML = html;

  savesList.querySelectorAll('[data-load]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var id = this.getAttribute('data-load');
      var arr2 = getSaves();
      for(var i = 0; i < arr2.length; i++) {
        if(arr2[i].id === id) {
          var item = arr2[i];
          if(item.type === 'project' && item.files) {
            commitUndo();
            files = item.files.map(function(f){ return { id:f.id, name:f.name, content:f.content }; });
            undoSt = {}; redoSt = {};
            files.forEach(function(f){ undoSt[f.id] = []; redoSt[f.id] = []; });
            activeId = files[0].id;
            nextId = Math.max.apply(null, files.map(function(f){return f.id;})) + 1;
            editingTabId = null;
            renderTabs(); renderEditor();
          } else {
            commitUndo();
            getFile().name = item.name;
            applyContent(item.content);
            lastCommit = item.content;
            renderTabs();
          }
          savesPanel.classList.remove('show');
          showToast('Loaded: ' + item.name);
          return;
        }
      }
    });
  });

  savesList.querySelectorAll('[data-del]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      if (confirm('Are you sure you want to delete this saved item?')) {
        var id = this.getAttribute('data-del');
        var arr2 = getSaves().filter(function(s){ return s.id !== id; });
        setSaves(arr2);
        renderSavesList();
        showToast('Deleted');
      }
    });
  });
}
openSavesBtn.addEventListener('click',function(){ closeDropdown(); renderSavesList(); savesPanel.classList.add('show'); });
savesClose.addEventListener('click',function(){ savesPanel.classList.remove('show'); });

/* ═══════════ DELETE / RENAME / ADD FILE ═══════════ */
deleteBtn.addEventListener('click',function(){
  commitUndo();
  applyContent('');
  lastCommit = '';
  closeDropdown();
  showToast('Code cleared');
});

renameBtn.addEventListener('click',function(e){
  e.stopPropagation();
  startEditTabName(activeId);
  closeDropdown();
});

addFileBtn.addEventListener('click',function(){
  var id = nextId++;
  var name = 'file'+id+'.js';
  files.push({id:id, name:name, content:''});
  undoSt[id] = []; redoSt[id] = [];
  activeId = id;
  editingTabId = null;
  renderTabs(); renderEditor();
  closeDropdown();
  codeArea.focus();
});

/* ═══════════ UNIVERSAL MULTI-FILE PREVIEW ═══════════ */
function buildMultiFilePreview(){
  var activeFile = getFile();
  var baseFile = null;
  if (/\.html$/i.test(activeFile.name)) { baseFile = activeFile; }
  else {
    for (var i = 0; i < files.length; i++) {
      if (/\.html$/i.test(files[i].name)) { baseFile = files[i]; break; }
    }
  }
  if (!baseFile) return activeFile.content;

  var htmlContent = baseFile.content;
  var cssTags = '', jsTags = '';
  for (var i = 0; i < files.length; i++) {
    var file = files[i];
    if (file.id === baseFile.id) continue;
    var nameLower = file.name.toLowerCase();
    if (nameLower.endsWith('.css')) { cssTags += '\n<style>\n' + file.content + '\n</style>\n'; }
    else if (nameLower.endsWith('.js')) { jsTags += '\n<script>\n' + file.content + '\n<\/script>\n'; }
  }
  var result = htmlContent;
  if (cssTags) result = result.replace(/<\/head>/i, cssTags + '</head>');
  if (jsTags) result = result.replace(/<\/body>/i, jsTags + '</body>');
  return result;
}

function openPreview(){
  var combinedHTML = buildMultiFilePreview();
  previewFrame.srcdoc = combinedHTML;
  previewOverlay.classList.add('show');
}
function closePreviewFn(){
  previewOverlay.classList.remove('show');
  previewFrame.srcdoc = '';
}
playBtn.addEventListener('click', openPreview);
closePreview.addEventListener('click', closePreviewFn);
previewOverlay.addEventListener('click', function(e){ if(e.target === previewOverlay) closePreviewFn(); });

document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    if(savesPanel.classList.contains('show')){ savesPanel.classList.remove('show'); return; }
    if(previewOverlay.classList.contains('show')){ closePreviewFn(); return; }
    if(editingTabId !== null){ cancelRename(); return; }
    closeDropdown();
  }
});

/* ═══════════ RENDER EDITOR ═══════════ */
function renderEditor(){
  var f = getFile();
  codeArea.value = f.content;
  renderHL(f.content);
  renderLineNums(f.content);
  updateBtns();
  lastCommit = f.content;
}

/* ═══════════ INIT ═══════════ */
renderTabs();
renderEditor();

})();
</script>
